{{/*
Resolve the effective environment and Agave policy.
*/}}
{{- $env := include "common.environment" . -}}
{{- $agaveEnabled := eq (include "common.agaveEnabled" .) "true" -}}

{{- $platformConfig := .Values.platformConfig | default dict -}}
{{- $requestedSyncMode := get $platformConfig "syncMode" | default "governed" | toString | lower -}}
{{- $refreshInterval := get $platformConfig "refreshInterval" | default "6h" | toString -}}

{{- $pipeline := .Values.pipeline | default dict -}}
{{- $pipelineProvider := get $pipeline "provider" | default "" | toString | trim -}}
{{- $deploymentId := get $pipeline "deploymentId" | default "" | toString | trim -}}
{{- $runUri := get $pipeline "runUri" | default (printf "%d" .Release.Revision) -}}
{{- $trustedDeploymentEnvironment := get $pipeline "environment" | default "" | toString -}}
{{- $trustedRepositoryOwner := get $pipeline "repositoryOwner" | default "" | toString -}}
{{- $sharedSourceProof := .Values.agaveSharedSources | default dict -}}
{{- $sharedSourceCatalogueApiVersion := get $sharedSourceProof "catalogueApiVersion" | default "" | toString -}}
{{- $sharedSourceCatalogueDigest := get $sharedSourceProof "catalogueDigest" | default "" | toString -}}
{{- $publishedSharedSources := get $sharedSourceProof "sharedSources" | default dict -}}
{{- $syncIdentity := $deploymentId -}}
{{- if not $syncIdentity -}}
{{- $syncIdentity = printf "%s:%d" ($runUri | toString) .Release.Revision -}}
{{- end -}}
{{- $syncGeneration := $syncIdentity | sha256sum -}}

{{- $kerberos := .Values.kerberos | default dict -}}
{{- $kerberosEnabled := get $kerberos "enabled" | default false -}}

{{/*
Synchronisation policy validation.
*/}}
{{- if and
      $agaveEnabled
      (not (has $requestedSyncMode (list "continuous" "governed")))
-}}
{{- fail (printf
      "Invalid platformConfig.syncMode %q. Expected continuous or governed."
      $requestedSyncMode)
-}}
{{- end -}}


{{/*
Synchronisation policy.

Governed mode is the default. The ADR permits continuous reconciliation only
in development environments. All other and unknown environments fail closed
to governed mode.
*/}}
{{- $effectiveSyncMode := "governed" -}}
{{- $syncPolicyReason := "application-requested-governed" -}}

{{- if eq $requestedSyncMode "continuous" -}}
{{- if regexMatch "(^|-)dev$" $env -}}
{{- $effectiveSyncMode = "continuous" -}}
{{- $syncPolicyReason = "development-policy-allows-continuous" -}}
{{- else -}}
{{- $syncPolicyReason = "environment-policy-requires-governed" -}}
{{- end -}}
{{- end -}}

{{- if and
      $agaveEnabled
      (eq $effectiveSyncMode "continuous")
      (not (has $refreshInterval (list "6h" "12h")))
-}}
{{- fail (printf
      "Invalid continuous refresh interval %q. Expected 6h or 12h."
      $refreshInterval)
-}}
{{- end -}}


{{/*
Provider store selection.
*/}}
{{- $agaveStoreName := printf "agave-store-%s" $trustedDeploymentEnvironment -}}

{{- $legacyKerberosStoreName := get $kerberos "secretStoreName" | default "ksm-secret-store" -}}
{{- $kerberosStoreName := $legacyKerberosStoreName -}}

{{- if $agaveEnabled -}}
{{- $kerberosStoreName = $agaveStoreName -}}
{{- end -}}


{{/*
Kerberos credentials.

Legacy deployments retain their configured Kerberos store. Agave deployments
use the environment-scoped Agave ClusterSecretStore.
*/}}
{{- if $kerberosEnabled }}

{{- $kerberosRecordName := get $kerberos "recordName" | default
      (include "app.kerberosCredentialsName" .)
-}}

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: {{ include "app.kerberosExternalSecretName" . | quote }}
  namespace: {{ include "app.namespace" . | quote }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
  annotations:
    {{- include "common.annotations" . | nindent 4 }}
    agave.platform.xplor/sync-generation: {{ $syncGeneration | quote }}
{{ if $agaveEnabled }}
    agave.platform.xplor/requested-sync-mode: {{ $requestedSyncMode | quote }}
    agave.platform.xplor/effective-sync-mode: {{ $effectiveSyncMode | quote }}
    agave.platform.xplor/sync-policy-reason: {{ $syncPolicyReason | quote }}
{{ end }}
spec:
{{ if and $agaveEnabled (eq $effectiveSyncMode "continuous") }}
  refreshPolicy: Periodic
  refreshInterval: {{ $refreshInterval | quote }}
{{ else }}
  refreshPolicy: OnChange
  refreshInterval: "0s"
{{ end }}
  secretStoreRef:
    name: {{ $kerberosStoreName | quote }}
    kind: ClusterSecretStore

  target:
    name: {{ include "app.kerberosCredentialsName" . | quote }}
    creationPolicy: Owner
    deletionPolicy: Retain

    template:
      engineVersion: v2
      metadata:
        annotations:
          agave.platform.xplor/sync-generation: {{ $syncGeneration | quote }}
{{ if $deploymentId }}
          clearent.xplor/deployment-id: {{ $deploymentId | quote }}
{{ end }}
{{ if $agaveEnabled }}
          agave.platform.xplor/requested-sync-mode: {{ $requestedSyncMode | quote }}
          agave.platform.xplor/effective-sync-mode: {{ $effectiveSyncMode | quote }}
          agave.platform.xplor/sync-policy-reason: {{ $syncPolicyReason | quote }}
        labels:
          agave.platform.xplor/managed: "true"
          agave.platform.xplor/purpose: "kerberos"
{{ end }}
      data:
        principal: '{{ `{{ $rec := index . "` }}{{ $kerberosRecordName }}{{ `" | fromJson }}{{ range $rec.fields }}{{ if eq .type "login" }}{{ .value | first }}{{ end }}{{ end }}` }}'
        password: '{{ `{{ $rec := index . "` }}{{ $kerberosRecordName }}{{ `" | fromJson }}{{ range $rec.fields }}{{ if eq .type "password" }}{{ .value | first }}{{ end }}{{ end }}` }}'

  dataFrom:
    - find:
        name:
          regexp: {{ printf "^%s$" (regexQuoteMeta $kerberosRecordName) | quote }}
        conversionStrategy: Default
        decodingStrategy: None

{{- end }}


{{/*
Agave application variables and configuration templates.
*/}}
{{- if $agaveEnabled }}

{{/*
Bind the provider record identity to GitHub's triggering repository. These
values are supplied by the reusable deployment workflow, never by the
application contract. GitHub supplies the canonical owner/name repository
identity and its independently populated repository owner.
*/}}
{{- $trustedRepositoryRaw := get $pipeline "repository" | default "" | toString -}}
{{- $trustedRepositoryOwnerRaw := $trustedRepositoryOwner -}}
{{- $trustedRepository := $trustedRepositoryRaw | trim -}}
{{- $trustedRepositoryOwner = $trustedRepositoryOwnerRaw | trim -}}

{{- if ne $pipelineProvider "github_actions" -}}
{{- fail "Agave requires pipeline.provider github_actions." -}}
{{- end -}}

{{- if not $trustedRepository -}}
{{- fail "Agave requires the trusted GitHub GITHUB_REPOSITORY value to bind the application repository to its private record." -}}
{{- end -}}

{{- if not $trustedRepositoryOwner -}}
{{- fail "Agave requires the trusted GitHub GITHUB_REPOSITORY_OWNER value." -}}
{{- end -}}

{{- if or
      (ne $trustedRepositoryRaw $trustedRepository)
      (ne $trustedRepositoryOwnerRaw $trustedRepositoryOwner)
-}}
{{- fail "Agave GitHub repository identities may not contain leading or trailing whitespace." -}}
{{- end -}}

{{- if or
      (contains "/" $trustedRepositoryOwner)
      (contains "\\" $trustedRepositoryOwner)
-}}
{{- fail "Agave received an invalid GitHub repository owner containing a path separator." -}}
{{- end -}}

{{- $repositoryParts := splitList "/" $trustedRepository -}}
{{- if or
      (ne (len $repositoryParts) 2)
      (contains "\\" $trustedRepository)
-}}
{{- fail (printf
      "Trusted GitHub repository %q must use the exact owner/name form."
      $trustedRepository)
-}}
{{- end -}}

{{- $repositoryOwnerIdentity := index $repositoryParts 0 | lower -}}
{{- $repositoryIdentity := index $repositoryParts 1 | lower -}}

{{- if ne $repositoryOwnerIdentity ($trustedRepositoryOwner | lower) -}}
{{- fail (printf
      "Trusted GitHub repository owner %q does not match GITHUB_REPOSITORY owner %q."
      $trustedRepositoryOwner (index $repositoryParts 0))
-}}
{{- end -}}

{{- if ne $repositoryIdentity .Release.Name -}}
{{- fail (printf
      "Agave release/project name %q does not match the trusted GitHub repository identity %q derived from GITHUB_REPOSITORY."
      .Release.Name $repositoryIdentity)
-}}
{{- end -}}

{{- if or
      (not $trustedDeploymentEnvironment)
      (ne $trustedDeploymentEnvironment $env)
-}}
{{- fail
      "Agave chart configuration environment does not exactly match the platform-owned GitHub deployment environment."
-}}
{{- end -}}

{{- $files := .Files.Glob "config/templates/**" -}}
{{- $contract := .Values.secretsContract | default dict -}}
{{- $hasMappings := eq (include "common.hasSecrets" .) "true" -}}


{{/*
An Agave workload must declare at least one application variable or provide
at least one configuration template.
*/}}
{{- if and
      (not $files)
      (not $hasMappings)
-}}
{{- fail
      "Agave is enabled, but neither secretsContract mappings nor config/templates files were supplied."
-}}
{{- end -}}


{{/*
Classify private sources and shared sourceRefs before validating the minimal
compiler proof. The contract may name a shared sourceRef, but only the fixed
platform catalogue can publish that exact Keeper record title and its
property/attachment allow-lists.
*/}}
{{- if gt (len $contract) 10 -}}
{{- fail "The Agave contract exceeds the maximum of 10 sources." -}}
{{- end -}}

{{- $privateSources := dict -}}
{{- $sharedContractSources := dict -}}

{{- range $sourceRef, $_ := $contract -}}
{{- if hasPrefix "shared-" $sourceRef -}}
{{- $_ := set $sharedContractSources $sourceRef true -}}
{{- else if or
      (eq $sourceRef "default")
      (eq $sourceRef $.Release.Name)
-}}
{{- $_ := set $privateSources $sourceRef true -}}
{{- else -}}
{{- fail (printf
      "Unauthorised Agave sourceRef %q. Use default, a non-shared exact application source %q, or a platform-published shared-* sourceRef."
      $sourceRef $.Release.Name)
-}}
{{- end -}}
{{- end -}}

{{- if gt (len $privateSources) 1 -}}
{{- fail
      "The Agave contract supports no more than one private application source."
-}}
{{- end -}}


{{/*
`default` and a non-shared exact release name both resolve to the application's
private record. The shared-* namespace is reserved for catalogue sourceRefs;
applications with a shared-* release name use `default` for their private
record. Declaring both private aliases would make the contract ambiguous.
*/}}
{{- if and
      (ne .Release.Name "default")
      (not (hasPrefix "shared-" .Release.Name))
      (hasKey $contract "default")
      (hasKey $contract .Release.Name)
-}}
{{- fail (printf
      "The Agave contract cannot declare both default and %q because both resolve to the same private application record."
      .Release.Name)
-}}
{{- end -}}


{{/*
sourceRef is the exact Keeper record title. A private default must therefore
not resolve to a release name also proven as a published shared source.
*/}}
{{- if and
      (hasKey $contract "default")
      (hasKey $publishedSharedSources .Release.Name)
-}}
{{- fail (printf
      "Private Agave record title %q matches a published shared sourceRef; default cannot bypass the shared-source allow-list."
      .Release.Name)
-}}
{{- end -}}


{{/*
Validate the minimal platform-only catalogue proof against trusted Helm
inputs. The digest is provenance for the compiled catalogue file, not a
signature or runtime admission control.
*/}}
{{- if ne (len $publishedSharedSources) (len $sharedContractSources) -}}
{{- fail
      "Agave shared sourceRefs do not exactly match the compiler-generated catalogue proof."
-}}
{{- end -}}

{{- if gt (len $sharedContractSources) 0 -}}
{{- $proofProvider := get $sharedSourceProof "provider" | default "" | toString -}}
{{- $proofOrganisation := get $sharedSourceProof "organisation" | default "" | toString | trim -}}

{{- if ne $sharedSourceCatalogueApiVersion "agave.platform.xplor/v1alpha1" -}}
{{- fail "Agave shared sourceRefs require catalogue apiVersion agave.platform.xplor/v1alpha1." -}}
{{- end -}}

{{- if not (regexMatch "^[0-9a-f]{64}$" $sharedSourceCatalogueDigest) -}}
{{- fail "Agave shared sourceRefs require a valid compiler-generated catalogue digest." -}}
{{- end -}}

{{- if or
      (ne $proofProvider $pipelineProvider)
      (not $proofOrganisation)
      (ne ($proofOrganisation | lower) ($trustedRepositoryOwner | lower))
-}}
{{- fail
      "Agave shared-source caller scope does not match the platform-owned GitHub provider and organisation."
-}}
{{- end -}}

{{- range $sourceRef, $_ := $sharedContractSources -}}
{{- if not (hasKey $publishedSharedSources $sourceRef) -}}
{{- fail (printf
      "Shared Agave sourceRef %q has no compiler-generated catalogue proof."
      $sourceRef)
-}}
{{- end -}}
{{- end -}}
{{- end -}}


{{/*
Validate shared-source publication and collect all resulting Secret keys.

Keys are tracked case-insensitively to remain consistent with pipeline
validation and to prevent ambiguous environment-variable or filename mappings.
*/}}
{{- $seenOutputNames := dict -}}

{{- range $recordName, $fields := $contract -}}

{{- if and
      (ne $recordName "default")
      (not (regexMatch "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$" $recordName))
-}}
{{- fail (printf
      "Invalid Agave record name %q. Use default or a lowercase DNS-compatible record name."
      $recordName)
-}}
{{- end -}}

{{- if gt (len $recordName) 63 -}}
{{- fail (printf
      "Agave record name %q exceeds the 63-character limit."
      $recordName)
-}}
{{- end -}}

{{- $isSharedSource := hasPrefix "shared-" $recordName -}}
{{- $isApplicationRecord := or
      (eq $recordName "default")
      (and
        (not $isSharedSource)
        (eq $recordName $.Release.Name)
      )
-}}

{{- if and (not $isApplicationRecord) (not $isSharedSource) -}}
{{- fail (printf
      "Unauthorised Agave sourceRef %q."
      $recordName)
-}}
{{- end -}}

{{- $publishedSource := dict -}}
{{- $requestedProperties := dict -}}
{{- $requestedAttachments := dict -}}
{{- if $isSharedSource -}}
{{- $publishedSource = get $publishedSharedSources $recordName | default dict -}}
{{- if not (kindIs "map" $publishedSource) -}}
{{- fail (printf
      "Shared Agave sourceRef %q has a malformed source proof."
      $recordName)
-}}
{{- end -}}
{{- if or
      (ne (len $publishedSource) 2)
      (not (hasKey $publishedSource "properties"))
      (not (hasKey $publishedSource "attachments"))
-}}
{{- fail (printf
      "Shared Agave sourceRef %q proof must contain only properties and attachments."
      $recordName)
-}}
{{- end -}}
{{- end -}}

{{- range $targetName, $sourceDetails := $fields -}}

{{- $normalisedTargetName := lower $targetName -}}

{{- if hasKey $seenOutputNames $normalisedTargetName -}}
{{- fail (printf
      "Duplicate Agave target key %q. Target keys must be unique across all provider records."
      $targetName)
-}}
{{- end -}}

{{- $_ := set $seenOutputNames $normalisedTargetName true -}}

{{- $isBinary := false -}}
{{- $providerProperty := $sourceDetails -}}
{{- if typeIs "string" $sourceDetails -}}
{{- else if and
      (kindIs "map" $sourceDetails)
      (eq (len $sourceDetails) 1)
      (hasKey $sourceDetails "isBinary")
      (eq "true" (toString (get $sourceDetails "isBinary")))
-}}
{{- $isBinary = true -}}
{{- $providerProperty = $targetName -}}
{{- else -}}
{{- fail (printf
      "Agave target %q has a malformed provider mapping."
      $targetName)
-}}
{{- end -}}

{{- if $isSharedSource -}}
{{- $providerProperty = $providerProperty | toString -}}
{{- $permittedNames := get $publishedSource "properties" | default list -}}
{{- if $isBinary -}}
{{- $permittedNames = get $publishedSource "attachments" | default list -}}
{{- end -}}
{{- if not (has $providerProperty $permittedNames) -}}
{{- fail (printf
      "Shared Agave sourceRef %q does not publish provider %s %q."
      $recordName (ternary "attachment" "property" $isBinary) $providerProperty)
-}}
{{- end -}}
{{- if $isBinary -}}
{{- $_ := set $requestedAttachments $providerProperty true -}}
{{- else -}}
{{- $_ := set $requestedProperties $providerProperty true -}}
{{- end -}}
{{- end -}}

{{- end -}}

{{- if $isSharedSource -}}
{{- $proofProperties := get $publishedSource "properties" | default list -}}
{{- $proofAttachments := get $publishedSource "attachments" | default list -}}
{{- if or
      (ne (len $proofProperties) (len $requestedProperties))
      (ne (len $proofAttachments) (len $requestedAttachments))
-}}
{{- fail (printf
      "Shared Agave sourceRef %q catalogue proof is wider than the compiled contract."
      $recordName)
-}}
{{- end -}}
{{- range $providerProperty := $proofProperties -}}
{{- if not (hasKey $requestedProperties $providerProperty) -}}
{{- fail (printf
      "Shared Agave sourceRef %q catalogue proof contains an unrequested property."
      $recordName)
-}}
{{- end -}}
{{- end -}}
{{- range $attachmentName := $proofAttachments -}}
{{- if not (hasKey $requestedAttachments $attachmentName) -}}
{{- fail (printf
      "Shared Agave sourceRef %q catalogue proof contains an unrequested attachment."
      $recordName)
-}}
{{- end -}}
{{- end -}}
{{- end -}}
{{- end -}}

{{- if gt (len $seenOutputNames) 50 -}}
{{- fail
      "The Agave contract exceeds the maximum of 50 mapped fields."
-}}
{{- end -}}

{{- $sharedSourceRefsAnnotation := keys $sharedContractSources | sortAlpha | join "," -}}


{{/*
The ConfigMap and Secret use basenames as keys.

Prevent:

- templates in separate directories from sharing a basename;
- template filenames from colliding with contract target keys.
*/}}
{{- $seenTemplateNames := dict -}}

{{- range $path, $bytes := $files -}}

{{- $templateName := base $path -}}
{{- $normalisedTemplateName := lower $templateName -}}

{{- if or
      (gt (len $templateName) 253)
      (not (regexMatch "^[A-Za-z0-9._-]+$" $templateName))
-}}
{{- fail (printf
      "Invalid Agave template filename %q. ConfigMap and Secret keys may contain only letters, numbers, dots, underscores and hyphens, up to 253 characters."
      $templateName)
-}}
{{- end -}}

{{- if hasKey $seenTemplateNames $normalisedTemplateName -}}
{{- fail (printf
      "Duplicate Agave template filename %q. Template filenames must be unique even when stored in separate directories."
      $templateName)
-}}
{{- end -}}

{{- if hasKey $seenOutputNames $normalisedTemplateName -}}
{{- fail (printf
      "Agave template filename %q collides with a secretsContract target key. Template filenames and contract target keys must be unique."
      $templateName)
-}}
{{- end -}}

{{- $_ := set $seenTemplateNames $normalisedTemplateName true -}}

{{- end -}}


---
apiVersion: external-secrets.io/v1
kind: ExternalSecret

metadata:
  name: {{ include "app.externalSecretName" . | quote }}
  namespace: {{ include "app.namespace" . | quote }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
  annotations:
    {{- include "common.annotations" . | nindent 4 }}
    agave.platform.xplor/sync-generation: {{ $syncGeneration | quote }}
    agave.platform.xplor/requested-sync-mode: {{ $requestedSyncMode | quote }}
    agave.platform.xplor/effective-sync-mode: {{ $effectiveSyncMode | quote }}
    agave.platform.xplor/sync-policy-reason: {{ $syncPolicyReason | quote }}
{{ if $sharedSourceCatalogueDigest }}
    agave.platform.xplor/shared-source-catalogue-sha256: {{ $sharedSourceCatalogueDigest | quote }}
{{ end }}
{{ if $sharedSourceRefsAnnotation }}
    agave.platform.xplor/shared-source-refs: {{ $sharedSourceRefsAnnotation | quote }}
{{ end }}

spec:
  {{- if eq $effectiveSyncMode "continuous" }}
  refreshPolicy: Periodic
  refreshInterval: {{ $refreshInterval | quote }}
  {{- else }}
  refreshPolicy: OnChange
  {{- end }}

  secretStoreRef:
    name: {{ $agaveStoreName | quote }}
    kind: ClusterSecretStore

  target:
    name: {{ include "app.renderedConfigSecretName" . | quote }}
    creationPolicy: Owner
    deletionPolicy: Retain

    template:
      engineVersion: v2
      mergePolicy: Merge

      metadata:
        annotations:
          agave.platform.xplor/sync-generation: {{ $syncGeneration | quote }}
{{ if $deploymentId }}
          clearent.xplor/deployment-id: {{ $deploymentId | quote }}
{{ end }}
          agave.platform.xplor/requested-sync-mode: {{ $requestedSyncMode | quote }}
          agave.platform.xplor/effective-sync-mode: {{ $effectiveSyncMode | quote }}
          agave.platform.xplor/sync-policy-reason: {{ $syncPolicyReason | quote }}
{{ if $sharedSourceCatalogueDigest }}
          agave.platform.xplor/shared-source-catalogue-sha256: {{ $sharedSourceCatalogueDigest | quote }}
{{ end }}
{{ if $sharedSourceRefsAnnotation }}
          agave.platform.xplor/shared-source-refs: {{ $sharedSourceRefsAnnotation | quote }}
{{ end }}
        labels:
          agave.platform.xplor/managed: "true"
          agave.platform.xplor/application: {{ include "app.name" . | quote }}
          agave.platform.xplor/environment: {{ $trustedDeploymentEnvironment | quote }}
          agave.platform.xplor/sync-mode: {{ $effectiveSyncMode | quote }}

      {{- if $files }}
      templateFrom:
        - target: Data
          configMap:
            name: {{ include "app.configTemplatesName" . | quote }}
            items:
              {{- range $path, $bytes := $files }}
              - key: {{ base $path | quote }}
                templateAs: Values
              {{- end }}
      {{- end }}

  {{- if $hasMappings }}
  data:
    {{- range $recordName, $fields := $contract }}

    {{- $resolvedRecordKey := $recordName -}}

    {{- if eq $recordName "default" -}}
    {{- $resolvedRecordKey = $.Release.Name -}}
    {{- end -}}

    {{- range $targetName, $sourceDetails := $fields }}

    {{- $isBinary := and
          (kindIs "map" $sourceDetails)
          (eq (len $sourceDetails) 1)
          (hasKey $sourceDetails "isBinary")
          (eq "true" (toString (get $sourceDetails "isBinary")))
    -}}

    {{- $providerProperty := $sourceDetails -}}

    {{- if $isBinary -}}
    {{- $providerProperty = $targetName -}}
    {{- end }}

    - secretKey: {{ $targetName | quote }}
      remoteRef:
        key: {{ $resolvedRecordKey | quote }}
        property: {{ $providerProperty | quote }}
        conversionStrategy: Default
        decodingStrategy: None

    {{- end }}
    {{- end }}
  {{- end }}

{{- end }}
