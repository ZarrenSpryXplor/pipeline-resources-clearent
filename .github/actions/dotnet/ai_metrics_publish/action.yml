name: Publish AI Metrics
description: "Publish AI Metrics artifacts for PowerBI ingestion and reporting."

inputs:
  sftp_server: 
    description: 'The SFTP server to which AI Metrics will be published.'
    required: true

  ai_path:
    description: 'The path within the container where AI Metrics will be published.'
    required: true

  coverage_path:
    description: 'The path within the container where code coverage files will be published.'
    required: true

  container_name:
    description: 'The name of the container where AI Metrics will be published.'
    required: true

  sas_key:
    description: 'The SAS key for authenticating to the storage account when publishing AI Metrics.'
    required: true

#outputs:

runs:
  using: "composite"

  steps:
    - name: AI Metrics - Publish AI Metrics to Azure Storage
      continue-on-error: true
      shell: pwsh
      run: |-
        $computer = '${{ inputs.sftp_server }}'
        $aiPath = '${{ inputs.ai_path }}'
        $coveragePath = '${{ inputs.coverage_path }}'
        $containerName = '${{ inputs.container_name }}'
        $sasKey = '${{ inputs.sas_key }}'

        $datetime = (Get-Date).ToString('yyyyMMdd_HHmmss')

        Write-Host "Current directory: $(Get-Location)"
        Set-Location -Path '${{ runner.workspace }}'
        Write-Host "Changed directory: $(Get-Location)"

        # Keep AZCopy logs inside the workspace so the artifact upload step can find them reliably.
        $azcopyLogPath = Join-Path '${{ runner.workspace }}' '.azcopy'
        New-Item -ItemType Directory -Path $azcopyLogPath -Force | Out-Null
        $env:AZCOPY_LOG_LOCATION = $azcopyLogPath
        $env:AZCOPY_JOB_PLAN_LOCATION = $azcopyLogPath
        Write-Host "AZCopy logs will be written to $azcopyLogPath"

        # Stage files in a temp directory before uploading so the source files stay untouched.
        $tempDir = Join-Path "${{ runner.temp }}" "azcopy_upload_$datetime"
        New-Item -ItemType Directory -Path $tempDir -Force | Out-Null
        Write-Host "Created temporary directory: $tempDir"

        $slnFile = Get-ChildItem -Path '.' -Recurse -Filter "*.sln"
        $fileNm = [System.IO.Path]::GetFileNameWithoutExtension($slnFile.FullName)

        $coverageFiles = Get-ChildItem -Path '.' -Recurse -Include "*.cobertura.xml"
        #-Filter "*.cobertura.xml|*.coverage"

        # Upload the primary AI Metrics XML files produced from the solution name.
        $files = Get-ChildItem -Path . -Filter "${fileNm}*.xml" -File

        Write-Host "AI Metrics local files found: $files"

        $azcopyPath = "${{ runner.workspace }}/tools/azcopy"

        try {

            foreach($file in $files){
                $fileName = Split-Path -Path $file -Leaf
                $tempFilePath = Join-Path $tempDir $fileName

              # Copy to the temp location so each upload uses a stable path.
                Copy-Item -Path $file.FullName -Destination $tempFilePath -Force
                Write-Host "Copied $file to temp location: $tempFilePath"

                Write-Host "Uploading $tempFilePath to https://$computer/$containerName/$aiPath/$fileName"

                . "$azcopyPath" cp "$tempFilePath" "https://$computer/$containerName/$aiPath/$fileName`?$sasKey" --overwrite=true --log-level DEBUG
            }

            $iterator = 1;
            foreach($file in $coverageFiles){
                # Rename each coverage file uniquely before upload to avoid collisions in storage.
                $remoteNm = "${fileNm}_${datetime}_${iterator}.cobertura.xml"
                $tempFilePath = Join-Path $tempDir $remoteNm

                # Copy to the temp location so the final remote name matches the upload target.
                Copy-Item -Path $file.FullName -Destination $tempFilePath -Force
                Write-Host "Copied $file to temp location: $tempFilePath"

                $fileName = Split-Path -Path $file -Leaf
                Write-Host "Rename $coveragePath$fileName to $remoteNm"

                . "$azcopyPath" cp "$tempFilePath" "https://$computer/$containerName/$coveragePath/$remoteNm`?$sasKey" --overwrite=true --log-level DEBUG
                $iterator++;
            }
        }
        catch {
            Write-Host $_.exception.Message
        }
        finally {
            # Remove the temp upload staging directory after the transfer completes.
            if (Test-Path $tempDir) {
                Remove-Item -Path $tempDir -Recurse -Force
                Write-Host "Cleaned up temporary directory: $tempDir"
            }
        }
        exit 0
    
    - name: Publish azcopy logs as build artifacts
      continue-on-error: true
      uses: actions/upload-artifact@v4.1.0
      with:
        name: AzCopyLogs
        path: ${{ runner.workspace }}/.azcopy
