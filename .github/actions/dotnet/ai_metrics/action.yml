name: AI Metrics
description: "Run Xplor.AI.Metrics.BuildTool to generate AI Metrics for .NET projects."

inputs:
  
outputs:

runs:
  using: "composite"

  steps:
    - name: Install Xplor.AI.Metrics.BuildTool
      env:
        # Keep these aligned with caller nuget.config placeholders (%GITHUB_USERNAME%/%GITHUB_TOKEN%).
        GITHUB_USERNAME: ${{ secrets.XPLOR_PAY_PACKAGE_READ_PAT != '' && secrets.XPLOR_PAY_PACKAGE_READ_USERNAME || 'x-access-token' }}
        GITHUB_TOKEN: ${{ secrets.XPLOR_PAY_PACKAGE_READ_PAT }}
      shell: bash
      run: dotnet tool install --global Xplor.AI.Metrics.BuildTool --version 0.1.0-rc.1
