name: AI Metrics Installation, Analysis, and Reporting
description: "Install necessary tools for generating AI Metrics for .NET projects, run the analysis, and publish the results."

inputs:
  sftp_server: 
    description: 'The SFTP server to which AI Metrics will be published.'
    required: true

  ai_path:
    description: 'The path within the container where AI Metrics will be published.'
    required: true

  coverage_path:
    description: 'The path within the container where code coverage files will be published.'
    required: true

  container_name:
    description: 'The name of the container where AI Metrics will be published.'
    required: true

  sas_key:
    description: 'The SAS key for authenticating to the storage account when publishing AI Metrics.'
    required: true

#outputs:

runs:
  using: "composite"

  steps:

    - name: AI Metrics - Install Xplor.AI.Metrics.BuildTool - Start
      shell: bash
      run: |
        echo "::notice::AI Metrics - Install Xplor.AI.Metrics.BuildTool..."

    - name: AI Metrics - Install Xplor.AI.Metrics.BuildTool
      shell: bash
      run: |
        set -euo pipefail

        # Ensure tool path exists (and make it available to later steps).
        TOOL_PATH="${TOOL_PATH:-${RUNNER_TEMP}/tools}"
        mkdir -p "$TOOL_PATH"
        echo "$TOOL_PATH" >> "$GITHUB_PATH"

        # First try update (works if already installed), then install if not present.
        dotnet tool update Xplor.AI.Metrics.BuildTool \
          --version "$AI_METRICS_PACKAGE_VERSION" \
          --tool-path "$TOOL_PATH" \
          --configfile "./nuget.config" \
          --ignore-failed-sources \
        || dotnet tool install Xplor.AI.Metrics.BuildTool \
          --version "$AI_METRICS_PACKAGE_VERSION" \
          --tool-path "$TOOL_PATH" \
          --configfile "./nuget.config" \
          --ignore-failed-sources

    - name: AI Metrics - Install Xplor.AI.Metrics.BuildTool - End
      if: ${{ always() }}
      shell: bash
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "::notice::AI Metrics - Install Xplor.AI.Metrics.BuildTool completed successfully."
        else
          echo "::warning::AI Metrics - Install Xplor.AI.Metrics.BuildTool finished with status: ${{ job.status }}"
        fi

    - name: AI Metrics - Install AZCopy - Start
      shell: bash
      run: |
        echo "::notice::AI Metrics - Install AZCopy..."

    - name: AI Metrics - Install AZCopy
      shell: pwsh
      run: |
        $toolsPath = "${{ runner.workspace }}/tools"
        $azcopyPath = "$toolsPath/azcopy"

        # Check if AZCopy already exists
        if (Test-Path $azcopyPath) {
            Write-Host "AZCopy already exists at $azcopyPath"
            try {
                . "$azcopyPath" --version
                Write-Host "AZCopy is working correctly"
                exit 0
            }
            catch {
                Write-Host "AI Metrics - Install AZCopy - Existing AZCopy is not working, will re-download"
            }
        }

        # Create tools directory if it doesn't exist
        if (!(Test-Path $toolsPath)) {
            New-Item -ItemType Directory -Path $toolsPath -Force
            Write-Host "Created tools directory at $toolsPath"
        }

        # Download AZCopy
        $downloadUrl = "https://github.com/Azure/azure-storage-azcopy/releases/download/v10.30.1/azcopy_linux_amd64_10.30.1.tar.gz"
        $zipPath = "$toolsPath/azcopy.tar.gz"

        try {
            Write-Host "Downloading AZCopy from $downloadUrl"
            Invoke-WebRequest -Uri $downloadUrl -OutFile $zipPath

            Write-Host "Extracting AZCopy to $toolsPath"
            #Expand-Archive -Path $zipPath -DestinationPath $toolsPath -Force
            tar -xzf $zipPath -C $toolsPath

            # Find the extracted azcopy.exe (it's usually in a subdirectory)
            $extractedAzcopy = Get-ChildItem -Path $toolsPath -Name "azcopy" -Recurse | Select-Object -First 1
            if ($extractedAzcopy) {
                $extractedPath = Join-Path $toolsPath $extractedAzcopy
                # Move azcopy.exe to the tools root directory
                Move-Item -Path $extractedPath -Destination $azcopyPath -Force
                Write-Host "Moved azcopy to $azcopyPath"
            }

            # Clean up zip file and any extracted directories
            Remove-Item -Path $zipPath -Force

            # Verify installation
            & "$azcopyPath" --version
            Write-Host "AI Metrics - Install AZCopy completed successfully"
        }
        catch {
            Write-Host "Error installing AZCopy: $($_.Exception.Message)"
            exit 1
        }
    
    - name: AI Metrics - Install AZCopy - End
      if: ${{ always() }}
      shell: bash
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "::notice::AI Metrics - Install AZCopy completed successfully."
        else
          echo "::warning::AI Metrics - Install AZCopy finished with status: ${{ job.status }}"
        fi

    - name: AI Metrics - Run Xplor.AI.Metrics.BuildTool - Start
      shell: bash
      run: |
        echo "::notice::AI Metrics - Run Xplor.AI.Metrics.BuildTool..."

    - name: AI Metrics - Run Xplor.AI.Metrics.BuildTool
      shell: bash
      run: |
        echo "AI Metrics - Run Xplor.AI.Metrics.BuildTool"
        ls -lah
        cd ${{ runner.workspace }}/tools
        ./Xplor.AI.Metrics.BuildTool "${{ runner.workspace }}" -r xml
        ls -lah
        cp *.xml ${{ runner.workspace }}
        cp ${{ runner.temp }}/**/coverage.cobertura.xml ${{ runner.workspace }}
        cd ${{ runner.workspace }}
        ls -lah
        echo "AI Metrics - Run Xplor.AI.Metrics.BuildTool completed successfully"

    - name: AI Metrics - Run Xplor.AI.Metrics.BuildTool - End
      if: ${{ always() }}
      shell: bash
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "::notice::AI Metrics - Run Xplor.AI.Metrics.BuildTool completed successfully."
        else
          echo "::warning::AI Metrics - Run Xplor.AI.Metrics.BuildTool finished with status: ${{ job.status }}"
        fi

    - name: AI Metrics - Publish AI Metrics to Azure Storage - Start
      shell: bash
      run: |
        echo "::notice::AI Metrics - Publish AI Metrics to Azure Storage..."

    - name: AI Metrics - Publish AI Metrics to Azure Storage
      continue-on-error: true
      shell: pwsh
      run: |-
        $computer = '${{ inputs.sftp_server }}'
        $aiPath = '${{ inputs.ai_path }}'
        $coveragePath = '${{ inputs.coverage_path }}'
        $containerName = '${{ inputs.container_name }}'
        $sasKey = '${{ inputs.sas_key }}'

        $datetime = (Get-Date).ToString('yyyyMMdd_HHmmss')

        Write-Host "Current directory: $(Get-Location)"
        Set-Location -Path '${{ runner.workspace }}'
        Write-Host "Changed directory: $(Get-Location)"

        # Create temporary directory for file copies
        $tempDir = Join-Path "${{ runner.temp }}" "azcopy_upload_$datetime"
        New-Item -ItemType Directory -Path $tempDir -Force | Out-Null
        Write-Host "Created temporary directory: $tempDir"

        $slnFile = Get-ChildItem -Path '.' -Recurse -Filter "*.sln"
        $fileNm = [System.IO.Path]::GetFileNameWithoutExtension($slnFile.FullName)

        $coverageFiles = Get-ChildItem -Path '.' -Recurse -Include "*.cobertura.xml"
        #-Filter "*.cobertura.xml|*.coverage"

        $files = Get-ChildItem -Path . -Filter "${fileNm}*.xml" -File

        Write-Host "AI Metrics local files found: $files"

        $azcopyPath = "${{ runner.workspace }}/tools/azcopy"

        try {

            foreach($file in $files){
                $fileName = Split-Path -Path $file -Leaf
                $tempFilePath = Join-Path $tempDir $fileName

                # Copy to temp location first
                Copy-Item -Path $file.FullName -Destination $tempFilePath -Force
                Write-Host "Copied $file to temp location: $tempFilePath"

                Write-Host "Uploading $tempFilePath to https://$computer/$containerName/$aiPath/$fileName"

                . "$azcopyPath" cp "$tempFilePath" "https://$computer/$containerName/$aiPath/$fileName`?$sasKey" --overwrite=true --log-level DEBUG
            }

            $iterator = 1;
            foreach($file in $coverageFiles){
                $remoteNm = "${fileNm}_${datetime}_${iterator}.cobertura.xml"
                $tempFilePath = Join-Path $tempDir $remoteNm

                # Copy to temp location first
                Copy-Item -Path $file.FullName -Destination $tempFilePath -Force
                Write-Host "Copied $file to temp location: $tempFilePath"

                $fileName = Split-Path -Path $file -Leaf
                Write-Host "Rename $coveragePath$fileName to $remoteNm"

                . "$azcopyPath" cp "$tempFilePath" "https://$computer/$containerName/$coveragePath/$remoteNm`?$sasKey" --overwrite=true --log-level DEBUG
                $iterator++;
            }
        }
        catch {
            Write-Host $_.exception.Message
        }
        finally {
            # Clean up temporary directory
            if (Test-Path $tempDir) {
                Remove-Item -Path $tempDir -Recurse -Force
                Write-Host "Cleaned up temporary directory: $tempDir"
            }
        }
        exit 0

    - name: AI Metrics - Publish AI Metrics to Azure Storage - End
      if: ${{ always() }}
      shell: bash
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "::notice::AI Metrics - Publish to Azure Storage completed successfully."
        else
          echo "::warning::AI Metrics - Publish to Azure Storage finished with status: ${{ job.status }}"
        fi

    - name: AI Metrics - Publish AZCopy Logs as Build Artifacts - Start
      shell: bash
      run: |
        echo "::notice::AI Metrics - Publish AZCopy Logs as Build Artifacts..."

    - name: AI Metrics - Publish AZCopy Logs as Build Artifacts
      continue-on-error: true
      uses: actions/upload-artifact@v4.1.0
      with:
        name: AzCopyLogs
        path: ${{ runner.workspace }}/.azcopy
  
    - name: AI Metrics - Publish AZCopy Logs as Build Artifacts - End
      if: ${{ always() }}
      shell: bash
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "::notice::AI Metrics - Publish AZCopy Logs as Build Artifacts completed successfully."
        else
          echo "::warning::AI Metrics - Publish AZCopy Logs as Build Artifacts finished with status: ${{ job.status }}"
        fi
