name: Run AI Metrics Analysis
description: "Run AI Metrics analysis for .NET projects."

#inputs:

#outputs:

runs:
  using: "composite"

  steps:

    - name: Run Xplor AI Build Metrics Tool
      shell: bash
      run: |
        set -euo pipefail

        echo "Run Xplor.AI.Metrics.BuildTool"

        TOOL_PATH="${TOOL_PATH:-${RUNNER_TEMP}/tools}"
        if command -v Xplor.AI.Metrics.BuildTool >/dev/null 2>&1; then
          BUILD_TOOL="$(command -v Xplor.AI.Metrics.BuildTool)"
        elif [ -x "$TOOL_PATH/Xplor.AI.Metrics.BuildTool" ]; then
          BUILD_TOOL="$TOOL_PATH/Xplor.AI.Metrics.BuildTool"
        else
          echo "::error::Xplor.AI.Metrics.BuildTool was not found on PATH or at $TOOL_PATH. Run the install action before analyze."
          exit 1
        fi

        ls -lah
        "$BUILD_TOOL" "${{ runner.workspace }}" -r xml
        ls -lah
        cp *.xml "${{ runner.workspace }}"
        
        RESULTS_DIR="${{ runner.workspace }}/${{ github.event.repository.name }}/TestResults"
        mapfile -t covfiles < <(find "$RESULTS_DIR" -type f -name 'coverage.cobertura.xml' | sort)
        if [ "${#covfiles[@]}" -eq 0 ]; then
          echo "::error::No coverage.cobertura.xml found under $RESULTS_DIR"
          exit 1
        fi
        cp "${covfiles[0]}" "${{ runner.workspace }}/coverage.cobertura.xml"
        
        cd "${{ runner.workspace }}"
        ls -lah
        
        echo "Xplor.AI.Metrics.BuildTool tool completed successfully"
