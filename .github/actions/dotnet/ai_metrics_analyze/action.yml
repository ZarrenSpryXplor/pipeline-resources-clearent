name: Run AI Metrics Analysis
description: "Run AI Metrics analysis for .NET projects."

#inputs:

#outputs:

runs:
  using: "composite"

  steps:

    - name: AI Metrics - Run AI Metrics Tool - Start
      shell: bash
      run: |
        echo "::notice::Step 4 - AI Metrics - Run AI Metrics Tool $AI_METRICS_PACKAGE_REPOSITORY ..."

    - name: AI Metrics - Run AI Metrics Tool
      shell: bash
      run: |
        set -euo pipefail

        echo "AI Metrics - Run AI Metrics Tool $AI_METRICS_PACKAGE_REPOSITORY"

        TOOL_PATH="${TOOL_PATH:-${RUNNER_TEMP}/tools}"
        if command -v $AI_METRICS_PACKAGE_REPOSITORY >/dev/null 2>&1; then
          BUILD_TOOL="$(command -v $AI_METRICS_PACKAGE_REPOSITORY)"
        elif [ -x "$TOOL_PATH/$AI_METRICS_PACKAGE_REPOSITORY" ]; then
          BUILD_TOOL="$TOOL_PATH/$AI_METRICS_PACKAGE_REPOSITORY"
        else
          echo "::error::$AI_METRICS_PACKAGE_REPOSITORY was not found on PATH or at $TOOL_PATH. Run the install action before analyze."
          exit 1
        fi

        ls -lah
        "$BUILD_TOOL" "${{ runner.workspace }}" -r xml
        ls -lah
        cp *.xml "${{ runner.workspace }}"
        
        RESULTS_DIR="${{ runner.workspace }}/${{ github.event.repository.name }}/TestResults"
        mapfile -t covfiles < <(find "$RESULTS_DIR" -type f -name 'coverage.cobertura.xml' | sort)
        if [ "${#covfiles[@]}" -eq 0 ]; then
          echo "::error::No coverage.cobertura.xml found under $RESULTS_DIR"
          exit 1
        fi
        cp "${covfiles[0]}" "${{ runner.workspace }}/coverage.cobertura.xml"
        
        cd "${{ runner.workspace }}"
        ls -lah

        echo "AI Metrics - Run AI Metrics Tool $AI_METRICS_PACKAGE_REPOSITORY completed successfully"

    - name: AI Metrics - Run AI Metrics Tool - End
      if: ${{ always() }}
      shell: bash
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "::notice::Step 4 - AI Metrics - Run AI Metrics Tool $AI_METRICS_PACKAGE_REPOSITORY completed successfully."
        else
          echo "::warning::Step 4 - AI Metrics - Run AI Metrics Tool $AI_METRICS_PACKAGE_REPOSITORY finished with status: ${{ job.status }}"
        fi
