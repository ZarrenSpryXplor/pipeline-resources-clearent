name: Code Coverage
description: "Run code coverage analysis and reporting"

inputs:
  dotnet_version:
    description: 'The .NET SDK version to use for the build and test steps.'
    required: true
    default: '8.0.x'

  baseline_coverage_threshold:
    description: 'Baseline coverage percentage threshold for pull requests to use when no baseline is defined in the coverage.txt in the main branch.'
    required: false
    default: '0'

  minimum_coverage_threshold:
    description: 'Minimum overall line coverage threshold, enforced by ReportGenerator.'
    required: false
    default: '80'

  artifact_retention_days:
    description: 'Number of days to retain workflow artifacts.'
    required: false
    default: '7'

#outputs:

runs:
  using: "composite"

  steps:
    - name: Resolve Code Coverage Threshold
      id: coverage-threshold
      shell: bash
      run: |
        set -euo pipefail

        echo "::group::Resolve Code Coverage Threshold"

        DEFAULT_BRANCH=${{ github.event.repository.default_branch }}
        MINIMUM="${{ inputs.minimum_coverage_threshold }}"
        BASELINE=""

        if gh run download --name coverage-baseline \
                          --branch "$DEFAULT_BRANCH" \
                          --repo "${{ github.repository }}" 2>/dev/null && [ -f coverage.txt ]; then
          BASELINE=$(cat coverage.txt)
        else
          BASELINE="${{ inputs.baseline_coverage_threshold }}"
          echo "$BASELINE" > coverage.txt
        fi

        EFFECTIVE_THRESHOLD=$(awk "BEGIN { b=$BASELINE; m=$MINIMUM; if (b > m) printf \"%.2f\", b; else printf \"%.2f\", m }")
        # ReportGenerator expects an integer for lineCoverage.
        EFFECTIVE_THRESHOLD_INT=$(awk "BEGIN { t=$EFFECTIVE_THRESHOLD; if (t == int(t)) printf \"%d\", t; else printf \"%d\", int(t)+1 }")

        echo "baseline_value=$BASELINE" >> $GITHUB_OUTPUT
        echo "effective_threshold=$EFFECTIVE_THRESHOLD_INT" >> $GITHUB_OUTPUT

        echo "::endgroup::"

    - name: Coverage Report - Start
      shell: bash
      run: |
        echo "::notice::Starting code coverage report generation..."

    - name: Generate Code Coverage Report
      uses: danielpalme/ReportGenerator-GitHub-Action@a003c8fb9ac008fd0fffd5faa4f7d3ecb52e0675 # 5.5.7
      with:
        reports: '**/TestResults/**/coverage.cobertura.xml'
        targetdir: 'coveragereport'
        reporttypes: 'HtmlInline;MarkdownSummary'
        customSettings: 'minimumCoverageThresholds:lineCoverage=${{ steps.coverage-threshold.outputs.effective_threshold }}'
        title: 'Code Coverage'

    - name: Coverage Report - End
      if: ${{ always() }}
      shell: bash
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "::notice::Code coverage report generation completed."
        else
          echo "::warning::Code coverage report generation finished with status: ${{ job.status }}"
        fi

    - name: Publish Code Coverage Summary to GitHub Action Summary
      shell: bash
      run: |
        set -euo pipefail

        echo "::group::Publish Code Coverage Summary to GitHub Action Summary"

        cat coveragereport/Summary.md >> $GITHUB_STEP_SUMMARY

        echo "::endgroup::"

    - name: Upload Coverage Report Artifact - Start
      shell: bash
      run: |
        echo "::notice::Starting code coverage report upload as build artifact..."

    - name: Upload HTML Code Coverage Report Artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: code-coverage-report-${{ inputs.dotnet_version }}
        path: coveragereport
        retention-days: ${{ inputs.artifact_retention_days }}

    - name: Upload Coverage Report Artifact - End
      if: ${{ always() }}
      shell: bash
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "::notice::Code coverage report upload completed."
        else
          echo "::warning::Code coverage report upload finished with status: ${{ job.status }}"
        fi

    - name: Compare Code Coverage Percentage to Threshold
      id: coverage-logic
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        set -euo pipefail

        echo "::group::Compare Code Coverage Percentage to Threshold"

        # 1. Extract new percentage from Cobertura XML for stable parsing.
        COVERAGE_FILE=$(find . -path "*/TestResults/*/coverage.cobertura.xml" | head -1)
        NEW_RATIO=$(grep -oPm1 '(?<=line-rate=")[0-9.]+' "$COVERAGE_FILE")
        NEW_PCT=$(awk "BEGIN { printf \"%.2f\", $NEW_RATIO * 100 }")
        echo "new_pct=$NEW_PCT" >> $GITHUB_OUTPUT

        # 2. Use resolved baseline value from the threshold step.
        BASELINE="${{ steps.coverage-threshold.outputs.baseline_value }}"
        echo "baseline_pct=$BASELINE" >> $GITHUB_OUTPUT

        # 3. Comparison
        if (( $(echo "$NEW_PCT < $BASELINE" | bc -l) )); then
          echo "status=fail" >> $GITHUB_OUTPUT
        else
          echo "status=pass" >> $GITHUB_OUTPUT
        fi

        echo "::endgroup::"
      
    - name: Prepare or Update Baseline Code Coverage File
      if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
      shell: bash
      run: |
        set -euo pipefail

        echo "::group::Prepare or Update Baseline Code Coverage File"

        # Build baseline from Cobertura XML on default-branch non-PR runs.
        COVERAGE_FILE=$(find . -path "*/TestResults/*/coverage.cobertura.xml" | head -1)
        BASELINE_RATIO=$(grep -oPm1 '(?<=line-rate=")[0-9.]+' "$COVERAGE_FILE")
        BASELINE_PCT=$(awk "BEGIN { printf \"%.2f\", $BASELINE_RATIO * 100 }")
        echo "$BASELINE_PCT" > coverage.txt

        echo "::endgroup::"

    # PR comment formatting and posting are skipped for non-PR runs.
    - name: Read Code Coverage Summary for Pull Request Comment
      id: read-summary
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        set -euo pipefail

        echo "::group::Read Code Coverage Summary for Pull Request Comment"

        # Use a unique delimiter for the multi-line output
        EOF=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
        echo "summary<<$EOF" >> $GITHUB_OUTPUT
        cat coveragereport/Summary.md >> $GITHUB_OUTPUT
        echo "$EOF" >> $GITHUB_OUTPUT

        echo "::endgroup::"

    - name: Add Comment to Pull Request with the Code Coverage Summary - Start
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        echo "::notice::Adding comment to pull request with code coverage summary..."

    - name: Add Comment to Pull Request with the Code Coverage Summary
      uses: mshick/add-pr-comment@ec328af66588ab8f77cdeb2c264f14aba45bbf59 # v3
      if: github.event_name == 'pull_request'
      with:
        message-id: coverage-report
        message: |
          ### 📊 Code Coverage Summary
          ${{ steps.read-summary.outputs.summary }}
            
          **Regression Check**: ${{ steps.coverage-logic.outputs.status == 'pass' && '✅ Passed' || '❌ Failed' }}
          * New: `${{ steps.coverage-logic.outputs.new_pct }}%` | Baseline: `${{ steps.coverage-logic.outputs.baseline_pct }}%`
            
          ---
          🔍 [View Run Summary](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
        update-only: true

    - name: Add Comment to Pull Request with the Code Coverage Summary - End
      if: ${{ github.event_name == 'pull_request' && always() }}
      shell: bash
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "::notice::Comment successfully added to pull request."
        else
          echo "::warning::Comment addition to pull request finished with status: ${{ job.status }}"
        fi

    # Fail PR runs when regression check reports lower coverage than baseline.
    - name: Fail Pull Request Verifications if Code Coverage Does Not Meet Threshold
      if: github.event_name == 'pull_request' && steps.coverage-logic.outputs.status == 'fail'
      shell: bash
      run: |
        echo "::group::Fail Pull Request Verifications if Code Coverage Does Not Meet Threshold"
        
        echo "::error::Code coverage check failed. New coverage of ${{ steps.coverage-logic.outputs.new_pct }}% does not meet the baseline threshold of ${{ steps.coverage-logic.outputs.baseline_pct }}%."

        echo "::endgroup::"

        exit 1

    - name: Update Baseline Code Coverage Artifact - Start
      if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
      shell: bash
      run: |
        echo "::notice::Updating baseline code coverage artifact..."

    # This step ensures that if we are on the default branch, we update the baseline for future PRs
    - name: Update Baseline Code Coverage Artifact
      if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: coverage-baseline
        path: coverage.txt
        retention-days: ${{ inputs.artifact_retention_days }}

    - name: Update Baseline Code Coverage Artifact - End
      if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && always() }}
      shell: bash
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "::notice::Baseline code coverage artifact successfully updated."
        else
          echo "::warning::Baseline code coverage artifact update finished with status: ${{ job.status }}"
        fi
