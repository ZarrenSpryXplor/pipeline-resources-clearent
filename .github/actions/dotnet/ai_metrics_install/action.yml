name: Install tools for AI Metrics
description: "Install necessary tools for generating AI Metrics for .NET projects."

#inputs:

#outputs:

runs:
  using: "composite"

  steps:

    - name: AI Metrics - Validate AI Metrics Repository - Start
      shell: bash
      run: |
        echo "::notice::Step 1 - AI Metrics - Validate AI Metrics Repository $AI_METRICS_PACKAGE_REPOSITORY ..."

    - name: AI Metrics - Validate AI Metrics Repository
      shell: bash
      run: |
        set -euo pipefail

        INPUT="$AI_METRICS_PACKAGE_REPOSITORY"

        # Allow only alphanumeric, dots, hyphens, and underscores (NuGet package ID chars)
        if ! [[ "$INPUT" =~ ^[A-Za-z0-9._-]+$ ]]; then
          echo "::error::ai_metrics_package_repository contains invalid characters: '$INPUT'"
          exit 1
        fi

        # Optionally enforce it must start with your org prefix
        if [[ "$INPUT" != Xplor.* ]]; then
          echo "::error::ai_metrics_package_repository must be an Xplor.* package, got: '$INPUT'"
          exit 1
        fi

    - name: AI Metrics - Validate AI Metrics Repository - End
      if: ${{ always() }}
      shell: bash
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "::notice::Step 1 - AI Metrics - Validate AI Metrics Repository $AI_METRICS_PACKAGE_REPOSITORY completed successfully."
        else
          echo "::warning::Step 1 - AI Metrics - Validate AI Metrics Repository $AI_METRICS_PACKAGE_REPOSITORY finished with status: ${{ job.status }}"
        fi

    - name: AI Metrics - Install AI Metrics Tool - Start
      shell: bash
      run: |
        echo "::notice::Step 2 - AI Metrics - Install AI Metrics Tool $AI_METRICS_PACKAGE_REPOSITORY ..."

    - name: AI Metrics - Install AI Metrics Tool
      shell: bash
      run: |
        set -euo pipefail

        # Ensure tool path exists (and make it available to later steps).
        TOOL_PATH="${TOOL_PATH:-${RUNNER_TEMP}/tools}"
        mkdir -p "$TOOL_PATH"
        echo "$TOOL_PATH" >> "$GITHUB_PATH"

        # First try update (works if already installed), then install if not present.
        dotnet tool update $AI_METRICS_PACKAGE_REPOSITORY \
          --version "$AI_METRICS_PACKAGE_VERSION" \
          --tool-path "$TOOL_PATH" \
          --configfile "./nuget.config" \
          --ignore-failed-sources \
        || dotnet tool install $AI_METRICS_PACKAGE_REPOSITORY \
          --version "$AI_METRICS_PACKAGE_VERSION" \
          --tool-path "$TOOL_PATH" \
          --configfile "./nuget.config" \
          --ignore-failed-sources

    - name: AI Metrics - Install AI Metrics Tool - End
      if: ${{ always() }}
      shell: bash
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "::notice::Step 2 - AI Metrics - Install AI Metrics Tool $AI_METRICS_PACKAGE_REPOSITORY completed successfully."
        else
          echo "::warning::Step 2 - AI Metrics - Install AI Metrics Tool $AI_METRICS_PACKAGE_REPOSITORY finished with status: ${{ job.status }}"
        fi

    - name: AI Metrics - Install AZCopy - Start
      shell: bash
      run: |
        echo "::notice::Step 3 - AI Metrics - Install AZCopy..."

    - name: AI Metrics - Install AZCopy
      shell: pwsh
      run: |
        $toolsPath = "${{ runner.workspace }}/tools"
        $azcopyPath = "$toolsPath/azcopy"

        # Check if AZCopy already exists
        if (Test-Path $azcopyPath) {
            Write-Host "AZCopy already exists at $azcopyPath"
            try {
                . "$azcopyPath" --version
                Write-Host "AZCopy is working correctly"
                exit 0
            }
            catch {
                Write-Host "AI Metrics - Install AZCopy - Existing AZCopy is not working, will re-download"
            }
        }

        # Create tools directory if it doesn't exist
        if (!(Test-Path $toolsPath)) {
            New-Item -ItemType Directory -Path $toolsPath -Force
            Write-Host "Created tools directory at $toolsPath"
        }

        # Download AZCopy
        $downloadUrl = "https://github.com/Azure/azure-storage-azcopy/releases/download/v10.30.1/azcopy_linux_amd64_10.30.1.tar.gz"
        $zipPath = "$toolsPath/azcopy.tar.gz"

        try {
            Write-Host "Downloading AZCopy from $downloadUrl"
            Invoke-WebRequest -Uri $downloadUrl -OutFile $zipPath

            Write-Host "Extracting AZCopy to $toolsPath"
            #Expand-Archive -Path $zipPath -DestinationPath $toolsPath -Force
            tar -xzf $zipPath -C $toolsPath

            # Find the extracted azcopy.exe (it's usually in a subdirectory)
            $extractedAzcopy = Get-ChildItem -Path $toolsPath -Name "azcopy" -Recurse | Select-Object -First 1
            if ($extractedAzcopy) {
                $extractedPath = Join-Path $toolsPath $extractedAzcopy
                # Move azcopy.exe to the tools root directory
                Move-Item -Path $extractedPath -Destination $azcopyPath -Force
                Write-Host "Moved azcopy to $azcopyPath"
            }

            # Clean up zip file and any extracted directories
            Remove-Item -Path $zipPath -Force

            # Verify installation
            & "$azcopyPath" --version
            Write-Host "AI Metrics - Install AZCopy completed successfully"
        }
        catch {
            Write-Host "Error installing AZCopy: $($_.Exception.Message)"
            exit 1
        }
    
    - name: AI Metrics - Install AZCopy - End
      if: ${{ always() }}
      shell: bash
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          echo "::notice::Step 3 - AI Metrics - Install AZCopy completed successfully."
        else
          echo "::warning::Step 3 - AI Metrics - Install AZCopy finished with status: ${{ job.status }}"
        fi
