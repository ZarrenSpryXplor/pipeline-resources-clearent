# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET Continuous Integration

on:
  workflow_call:
    inputs:
      dotnet_version:
        description: 'The .NET SDK version to use for the build and test steps.'
        required: true
        type: string
        default: '8.0.x'

      baseline_coverage_threshold:
        description: 'Baseline coverage percentage threshold for pull requests to use when no baseline is defined in the coverage.txt in the main branch.'
        required: false
        type: string
        default: '0'

      minimum_coverage_threshold:
        description: 'Minimum overall line coverage threshold, enforced by ReportGenerator.'
        required: false
        type: string
        default: '80'

      base_ref:
        description: 'Base branch for comparison in pull requests'
        type: string
        required: false
        
      head_ref:
        description: 'Head branch containing changes for pull requests'
        type: string
        required: false

      nuget_package:
        description: 'Toggle to indicate whether a NuGet package should be created if this is a NuGet repo'
        required: false
        type: boolean
        default: false

      upload_artifact:
        description: 'Toggle to upload build artifacts (not necessary for pull request runs)'
        required: true
        type: boolean
        default: false

      artifact_retention_days:
        description: 'Number of days to retain workflow artifacts.'
        required: false
        type: string
        default: '7'

      ai_metrics_package_repository:
        description: 'Repository that owns the Xplor.AI.Metrics.BuildTool package.'
        required: false
        type: string
        default: 'Xplor.AI.Metrics.BuildTool'

      ai_metrics_package_version:
        description: 'Version of Xplor.AI.Metrics.BuildTool to install.'
        required: false
        type: string
        default: '1.0.2'

      enforce_code_style:
        description: 'Toggle to indicate whether code style enforcement should be applied.'
        required: false
        type: boolean
        default: true

jobs:
  build:

    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read
      actions: read
      pull-requests: write
      packages: read

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Setup .NET Environment
      uses: ./.github/actions/dotnet/environment
      with:
        # Always install .NET 8 as well because Xplor.AI.Metrics.BuildTool is packaged under tools/net8.0.
        # This keeps tool installation stable even when caller repositories build with older SDKs.
        dotnet_version: |
          ${{ inputs.dotnet_version }}
          8.0.x

    # Pin the active .NET SDK for the build in case it is older than the version needed by Xplor.AI.Metrics.BuildTool.
    - name: Pin Active .NET SDK
      run: |
        set -euo pipefail

        if [ -f ./global.json ]; then
          echo "Repository global.json detected; honoring repository SDK pin."
          cat ./global.json
        else
          REQUESTED="${{ inputs.dotnet_version }}"
          # Enforce a minimum of .NET 8 for restore/build because repositories and tooling
          # in this workflow can target net8.0 even when callers pass an older SDK input.
          REQUESTED_MAJOR="${REQUESTED%%.*}"
          if [ "$REQUESTED_MAJOR" -lt 8 ]; then
            EFFECTIVE_REQUESTED="8.0.x"
            echo "Requested SDK '$REQUESTED' is below minimum supported '8.0.x'; using '$EFFECTIVE_REQUESTED'."
          else
            EFFECTIVE_REQUESTED="$REQUESTED"
          fi

          PREFIX="${EFFECTIVE_REQUESTED%x}"
          SELECTED=$(dotnet --list-sdks | awk -v p="$PREFIX" '$1 ~ ("^" p) {print $1}' | sort -V | tail -1)

          if [ -z "$SELECTED" ]; then
            echo "::error::Could not find an installed SDK matching '$EFFECTIVE_REQUESTED' (requested: '$REQUESTED')."
            dotnet --list-sdks
            exit 1
          fi

          printf '%s\n' \
            '{' \
            '  "sdk": {' \
            "    \"version\": \"$SELECTED\"," \
            '    "rollForward": "disable"' \
            '  }' \
            '}' > ./global.json

          echo "Generated temporary global.json to pin SDK to $SELECTED"
          cat ./global.json
        fi

        echo "dotnet --version => $(dotnet --version)"

    - name: Generate Xplor Pay Package Reader App Token
      id: package-reader-token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ secrets.XPLOR_PAY_PACKAGE_READER_APP_CLIENT_ID }}
        private-key: ${{ secrets.XPLOR_PAY_PACKAGE_READER_APP_PRIVATE_KEY }}
        owner: ${{ github.repository_owner }}
        repositories: |
          ${{ github.event.repository.name }}
          ${{ inputs.ai_metrics_package_repository }}

    - name: Verify Authentication to GitHub Packages
      env:
        GITHUB_USERNAME: ${{ secrets.XPLOR_PAY_PACKAGE_READ_PAT != '' && secrets.XPLOR_PAY_PACKAGE_READ_USERNAME || 'x-access-token' }}
        GITHUB_TOKEN: ${{ secrets.XPLOR_PAY_PACKAGE_READ_PAT != '' && secrets.XPLOR_PAY_PACKAGE_READ_PAT || steps.package-reader-token.outputs.token }}
        USE_PAT_AUTH: 'true'
        #GITHUB_USERNAME: 'x-access-token'
        #GITHUB_TOKEN: ${{ steps.package-reader-token.outputs.token }}
        #USE_PAT_AUTH: 'false'

        GITHUB_ORG: ${{ github.repository_owner }}
        AI_METRICS_REPOSITORY: ${{ inputs.ai_metrics_package_repository }}
      run: |
        set -euo pipefail
        dotnet --list-sdks
        if [ -n "${{ secrets.XPLOR_PAY_PACKAGE_READ_PAT }}" ]; then
          echo "Using PAT-based package read authentication."
        else
          echo "Using GitHub App installation token for package read authentication."
        fi

        if [ ! -f ./nuget.config ]; then
          echo "::error::nuget.config was not found at repository root."
          exit 1
        fi

        echo "Configured NuGet sources from ./nuget.config:"
        dotnet nuget list source --configfile ./nuget.config

        FEED_URL="https://nuget.pkg.github.com/xplor-pay/index.json"
        STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -u "$GITHUB_USERNAME:$GITHUB_TOKEN" "$FEED_URL")

        if [ "$STATUS" != "200" ]; then
          echo "::error::GitHub Packages auth preflight failed (HTTP $STATUS) for $FEED_URL. Verify caller permissions and package access settings."
          exit 1
        fi

        if [ "$USE_PAT_AUTH" = "true" ]; then
          echo "Skipping installation scope check for PAT auth mode."
        else
          INSTALL_REPOS_JSON="$(mktemp)"
          INSTALL_REPOS_STATUS=$(curl -sS -o "$INSTALL_REPOS_JSON" -w "%{http_code}" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/installation/repositories")

          if [ "$INSTALL_REPOS_STATUS" = "200" ]; then
            if ! python3 -c "import json,sys; d=json.load(open('$INSTALL_REPOS_JSON')); target='$GITHUB_ORG/$AI_METRICS_REPOSITORY'.lower(); names={r.get('full_name','').lower() for r in d.get('repositories',[])}; ok=target in names; print(f'Installation token scope includes {target}.' if ok else f'::error::GitHub App token installation scope does not include {target}. Update app installation repository access or token scoping.'); sys.exit(0 if ok else 1)"
            then
              exit 1
            fi
          else
            echo "::warning::Could not verify installation repository scope via GitHub API (HTTP $INSTALL_REPOS_STATUS)."
          fi
        fi

        echo "GitHub Packages auth preflight succeeded (HTTP $STATUS)."

    - name: Restore Repository Dependencies
      env:
        # Keep these aliases aligned with caller nuget.config placeholders.
        GITHUB_USERNAME: ${{ secrets.XPLOR_PAY_PACKAGE_READ_USERNAME }}
        GITHUB_TOKEN: ${{ secrets.XPLOR_PAY_PACKAGE_READ_PAT }}
        #GITHUB_USERNAME: 'x-access-token'
        #GITHUB_TOKEN: ${{ steps.package-reader-token.outputs.token }}
      run: |
          # Count .sln files in the root directory
          SLN_COUNT=$(find . -maxdepth 1 -name "*.sln" | wc -l)

          if [ "$SLN_COUNT" -gt 0 ]; then
            echo "✅ Found Solution file(s) in root. Restoring via .sln..."
            dotnet restore --configfile ./nuget.config
          else
            echo "⚠️ No .sln found in root. Restoring all .csproj files recursively..."
            find . -name "*.csproj" -exec dotnet restore --configfile ./nuget.config {} +
          fi

    - name: Review Repository Dependencies for Vulnerabilities
      if: github.event_name == 'pull_request'
      uses: actions/dependency-review-action@v5
      with:
        comment-summary-in-pr: always
        base-ref: ${{ inputs.base_ref }}
        head-ref: ${{ inputs.head_ref }}

    - name: Enforce .editorconfig Code Styles
      run: dotnet format --verbosity detailed --verify-no-changes

    - name: Build Repository
      run: dotnet build --configuration Release --no-restore

    - name: Run Tests
      run: | 
        dotnet test --configuration Release \
        --no-build \
        --no-restore \
        --verbosity normal \
        "--filter:TestCategory!~Integration&Category!~Integration" \
        --collect:"XPlat Code Coverage;Format=opencover,cobertura" \
        --results-directory ./TestResults \
        -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.SkipAutoProps=true DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude=[*Tests*]* DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeAssembliesWithoutSources=MissingAll DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.SingleHit=false DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.IncludeTestAssembly=false DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.UseSourceLink=false DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.DeterministicReport=false DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByAttribute=Obsolete,GeneratedCodeAttribute,CompilerGeneratedAttribute,ExcludeFromCodeCoverageAttribute

    - name: Resolve Code Coverage Threshold
      id: coverage-threshold
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail

        DEFAULT_BRANCH=${{ github.event.repository.default_branch }}
        MINIMUM="${{ inputs.minimum_coverage_threshold }}"
        BASELINE=""

        if gh run download --name coverage-baseline \
                          --branch "$DEFAULT_BRANCH" \
                          --repo "${{ github.repository }}" 2>/dev/null && [ -f coverage.txt ]; then
          BASELINE=$(cat coverage.txt)
        else
          BASELINE="${{ inputs.baseline_coverage_threshold }}"
          echo "$BASELINE" > coverage.txt
        fi

        EFFECTIVE_THRESHOLD=$(awk "BEGIN { b=$BASELINE; m=$MINIMUM; if (b > m) printf \"%.2f\", b; else printf \"%.2f\", m }")
        # ReportGenerator expects an integer for lineCoverage.
        EFFECTIVE_THRESHOLD_INT=$(awk "BEGIN { t=$EFFECTIVE_THRESHOLD; if (t == int(t)) printf \"%d\", t; else printf \"%d\", int(t)+1 }")

        echo "baseline_value=$BASELINE" >> $GITHUB_OUTPUT
        echo "effective_threshold=$EFFECTIVE_THRESHOLD_INT" >> $GITHUB_OUTPUT

    - name: Generate Code Coverage Report
      uses: danielpalme/ReportGenerator-GitHub-Action@5.5.7
      with:
        reports: '**/TestResults/**/coverage.cobertura.xml'
        targetdir: 'coveragereport'
        reporttypes: 'HtmlInline;MarkdownSummary'
        customSettings: 'minimumCoverageThresholds:lineCoverage=${{ steps.coverage-threshold.outputs.effective_threshold }}'

    - name: Publish Code Coverage Summary to GitHub Action Summary
      run: cat coveragereport/Summary.md >> $GITHUB_STEP_SUMMARY

    - name: Upload HTML Code Coverage Report Artifact
      uses: actions/upload-artifact@v7
      with:
        name: code-coverage-report-${{ inputs.dotnet_version }}
        path: coveragereport
        retention-days: ${{ inputs.artifact_retention_days }}

    # Coverage regression is evaluated only for pull requests.
    - name: Compare Code Coverage Percentage to Threshold
      id: coverage-logic
      if: github.event_name == 'pull_request'
      run: |
        # 1. Extract new percentage from Cobertura XML for stable parsing.
        COVERAGE_FILE=$(find . -path "*/TestResults/*/coverage.cobertura.xml" | head -1)
        NEW_RATIO=$(grep -oPm1 '(?<=line-rate=")[0-9.]+' "$COVERAGE_FILE")
        NEW_PCT=$(awk "BEGIN { printf \"%.2f\", $NEW_RATIO * 100 }")
        echo "new_pct=$NEW_PCT" >> $GITHUB_OUTPUT

        # 2. Use resolved baseline value from the threshold step.
        BASELINE="${{ steps.coverage-threshold.outputs.baseline_value }}"
        echo "baseline_pct=$BASELINE" >> $GITHUB_OUTPUT

        # 3. Comparison
        if (( $(echo "$NEW_PCT < $BASELINE" | bc -l) )); then
          echo "status=fail" >> $GITHUB_OUTPUT
        else
          echo "status=pass" >> $GITHUB_OUTPUT
        fi

    - name: Prepare or Update Baseline Code Coverage File
      if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
      run: |
        # Build baseline from Cobertura XML on default-branch non-PR runs.
        COVERAGE_FILE=$(find . -path "*/TestResults/*/coverage.cobertura.xml" | head -1)
        BASELINE_RATIO=$(grep -oPm1 '(?<=line-rate=")[0-9.]+' "$COVERAGE_FILE")
        BASELINE_PCT=$(awk "BEGIN { printf \"%.2f\", $BASELINE_RATIO * 100 }")
        echo "$BASELINE_PCT" > coverage.txt

    # PR comment formatting and posting are skipped for non-PR runs.
    - name: Read Code Coverage Summary for Pull Request Comment
      id: read-summary
      if: github.event_name == 'pull_request'
      run: |
        # Use a unique delimiter for the multi-line output
        EOF=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
        echo "summary<<$EOF" >> $GITHUB_OUTPUT
        cat coveragereport/Summary.md >> $GITHUB_OUTPUT
        echo "$EOF" >> $GITHUB_OUTPUT

    - name: Add Comment to Pull Request with the Code Coverage Summary
      uses: mshick/add-pr-comment@v3
      if: github.event_name == 'pull_request'
      with:
        message-id: coverage-report
        message: |
          ### 📊 Code Coverage Summary
          ${{ steps.read-summary.outputs.summary }}
            
          **Regression Check**: ${{ steps.coverage-logic.outputs.status == 'pass' && '✅ Passed' || '❌ Failed' }}
          * New: `${{ steps.coverage-logic.outputs.new_pct }}%` | Baseline: `${{ steps.coverage-logic.outputs.baseline_pct }}%`
            
          ---
          🔍 [View Run Summary](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
        update-only: true

    # Fail PR runs when regression check reports lower coverage than baseline.
    - name: Fail Pull Request Verifications if Code Coverage Does Not Meet Threshold
      if: github.event_name == 'pull_request' && steps.coverage-logic.outputs.status == 'fail'
      run: exit 1

    # This step ensures that if we are on the default branch, we update the baseline for future PRs
    - name: Update Baseline Code Coverage Artifact
      if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
      uses: actions/upload-artifact@v7
      with:
        name: coverage-baseline
        path: coverage.txt
        retention-days: ${{ inputs.artifact_retention_days }}

    - name: AI Metrics - Install Xplor.AI.Metrics.BuildTool
      env:
        # Keep these aligned with caller nuget.config placeholders (%GITHUB_USERNAME%/%GITHUB_TOKEN%).
        GITHUB_USERNAME: ${{ secrets.XPLOR_PAY_PACKAGE_READ_PAT != '' && secrets.XPLOR_PAY_PACKAGE_READ_USERNAME || 'x-access-token' }}
        GITHUB_TOKEN: ${{ secrets.XPLOR_PAY_PACKAGE_READ_PAT != '' && secrets.XPLOR_PAY_PACKAGE_READ_PAT || steps.package-reader-token.outputs.token }}
        GITHUB_ORG: ${{ github.repository_owner }}
        AI_METRICS_PACKAGE_VERSION: ${{ inputs.ai_metrics_package_version }}
      run: |
        dotnet tool install Xplor.AI.Metrics.BuildTool --version "$AI_METRICS_PACKAGE_VERSION" --tool-path "$TOOL_PATH" --configfile "./nuget.config" --create-manifest-if-needed --ignore-failed-sources 

