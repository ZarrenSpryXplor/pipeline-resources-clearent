# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET Continuous Integration

on:
  workflow_call:
    inputs:
      dotnet_version:
        description: 'The .NET SDK version to use for the build and test steps.'
        required: true
        type: string
        default: '8.0.x'

      baseline_coverage_threshold:
        description: 'Baseline coverage percentage threshold for pull requests to use when no baseline is defined in the coverage.txt in the main branch.'
        required: false
        type: string
        default: '0'

      minimum_coverage_threshold:
        description: 'Minimum overall line coverage threshold, enforced by ReportGenerator.'
        required: false
        type: string
        default: '80'

      base_ref:
        description: 'Base branch for comparison in pull requests'
        type: string
        required: false
        
      head_ref:
        description: 'Head branch containing changes for pull requests'
        type: string
        required: false

      nuget_package:
        description: 'Toggle to indicate whether a NuGet package should be created if this is a NuGet repo'
        required: false
        type: boolean
        default: false

      upload_artifact:
        description: 'Toggle to upload build artifacts (not necessary for pull request runs)'
        required: true
        type: boolean
        default: false

      artifact_retention_days:
        description: 'Number of days to retain workflow artifacts.'
        required: false
        type: string
        default: '7'

      tool_package_repository:
        description: 'Repository that owns the Xplor.AI.Metrics.BuildTool package.'
        required: false
        type: string
        default: 'Xplor.AI.Metrics.BuildTool'

      tool_package_version:
        description: 'Version of Xplor.AI.Metrics.BuildTool to install.'
        required: false
        type: string
        default: '1.0.2'

jobs:
  build:

    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: read
      actions: read
      pull-requests: write
      packages: read

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Setup .NET Environment
      uses: actions/setup-dotnet@v5
      with:
        # Always install .NET 8 as well because Xplor.AI.Metrics.BuildTool is packaged under tools/net8.0.
        # This keeps tool installation stable even when caller repositories build with older SDKs.
        dotnet-version: |
          ${{ inputs.dotnet_version }}
          8.0.x

    - name: Generate Xplor Pay Package Reader App Token
      id: package-reader-token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ secrets.XPLOR_PAY_PACKAGE_READER_APP_CLIENT_ID }}
        private-key: ${{ secrets.XPLOR_PAY_PACKAGE_READER_APP_PRIVATE_KEY }}
        owner: ${{ github.repository_owner }}
        repositories: |
          ${{ github.event.repository.name }}
          ${{ inputs.tool_package_repository }}

    - name: Verify Authentication to GitHub Packages
      env:
        GITHUB_USERNAME: ${{ secrets.XPLOR_PAY_PACKAGE_READ_PAT != '' && secrets.XPLOR_PAY_PACKAGE_READ_USERNAME || 'x-access-token' }}
        GITHUB_TOKEN: ${{ secrets.XPLOR_PAY_PACKAGE_READ_PAT != '' && secrets.XPLOR_PAY_PACKAGE_READ_PAT || steps.package-reader-token.outputs.token }}
        USE_PAT_AUTH: ${{ secrets.XPLOR_PAY_PACKAGE_READ_PAT != '' && 'true' || 'false' }}
        GITHUB_ORG: ${{ github.repository_owner }}
        TOOL_REPOSITORY: ${{ inputs.tool_package_repository }}
      run: |
        set -euo pipefail
        dotnet --list-sdks
        if [ -n "${{ secrets.XPLOR_PAY_PACKAGE_READ_PAT }}" ]; then
          echo "Using PAT-based package read authentication."
        else
          echo "Using GitHub App installation token for package read authentication."
        fi

        if [ ! -f ./nuget.config ]; then
          echo "::error::nuget.config was not found at repository root."
          exit 1
        fi

        echo "Configured NuGet sources from ./nuget.config:"
        dotnet nuget list source --configfile ./nuget.config

        FEED_URL="https://nuget.pkg.github.com/xplor-pay/index.json"
        STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -u "$GITHUB_USERNAME:$GITHUB_TOKEN" "$FEED_URL")

        if [ "$STATUS" != "200" ]; then
          echo "::error::GitHub Packages auth preflight failed (HTTP $STATUS) for $FEED_URL. Verify caller permissions and package access settings."
          exit 1
        fi

        if [ "$USE_PAT_AUTH" = "true" ]; then
          echo "Skipping installation scope check for PAT auth mode."
        else
          INSTALL_REPOS_JSON="$(mktemp)"
          INSTALL_REPOS_STATUS=$(curl -sS -o "$INSTALL_REPOS_JSON" -w "%{http_code}" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/installation/repositories")

          if [ "$INSTALL_REPOS_STATUS" = "200" ]; then
            if ! python3 -c "import json,sys; d=json.load(open('$INSTALL_REPOS_JSON')); target='$GITHUB_ORG/$TOOL_REPOSITORY'.lower(); names={r.get('full_name','').lower() for r in d.get('repositories',[])}; ok=target in names; print(f'Installation token scope includes {target}.' if ok else f'::error::GitHub App token installation scope does not include {target}. Update app installation repository access or token scoping.'); sys.exit(0 if ok else 1)"
            then
              exit 1
            fi
          else
            echo "::warning::Could not verify installation repository scope via GitHub API (HTTP $INSTALL_REPOS_STATUS)."
          fi
        fi

        INDEX_JSON="$(mktemp)"
        if ! curl -fsS -u "$GITHUB_USERNAME:$GITHUB_TOKEN" "$FEED_URL" -o "$INDEX_JSON"; then
          echo "::error::Failed to download authenticated NuGet service index from $FEED_URL."
          exit 1
        fi

        REG_BASE=$(python3 -c "import json; d=json.load(open('$INDEX_JSON')); ids=[]; [ids.append(x.get('@id','')) for x in d.get('resources',[]) if any(str(v).startswith('RegistrationsBaseUrl') for v in (x.get('@type',[]) if isinstance(x.get('@type',[]),list) else [x.get('@type','')])) and ('registr' in x.get('@id','').lower() or 'registration' in x.get('@id','').lower())]; print(ids[0] if ids else '')")

        if [ -z "$REG_BASE" ]; then
          echo "::warning::Could not find RegistrationsBaseUrl in service index. Skipping package-level preflight."
          echo "GitHub Packages auth preflight succeeded (HTTP $STATUS)."
          exit 0
        fi

        TOOL_PACKAGE_LOWER="xplor.ai.metrics.buildtool"
        TOOL_REG_URL="${REG_BASE%/}/$TOOL_PACKAGE_LOWER/index.json"

        TOOL_STATUS="$(curl -sS -o /dev/null -w '%{http_code}' -u "$GITHUB_USERNAME:$GITHUB_TOKEN" "$TOOL_REG_URL" || echo 'curl_failed')"

        if [ "$TOOL_STATUS" = "curl_failed" ]; then
          echo "::warning::Registration probe failed while calling $TOOL_REG_URL. Continuing because feed auth already succeeded."
        elif [ "$TOOL_STATUS" = "403" ]; then
          echo "::error::Token can reach the feed index but is forbidden from package registration metadata ($TOOL_REG_URL). Verify app installation scope and package access."
          exit 1
        elif [ "$TOOL_STATUS" = "404" ]; then
          echo "::warning::Package registration metadata not found at $TOOL_REG_URL. Verify package ID and that it is published in this org feed."
        else
          echo "Tool package registration probe returned HTTP $TOOL_STATUS."
        fi

        echo "GitHub Packages auth preflight succeeded (HTTP $STATUS)."

    - name: Restore Repository Dependencies
      run: |
          # Count .sln files in the root directory
          SLN_COUNT=$(find . -maxdepth 1 -name "*.sln" | wc -l)

          if [ "$SLN_COUNT" -gt 0 ]; then
            echo "✅ Found Solution file(s) in root. Restoring via .sln..."
            dotnet restore
          else
            echo "⚠️ No .sln found in root. Restoring all .csproj files recursively..."
            find . -name "*.csproj" -exec dotnet restore {} +
          fi

    - name: Review Repository Dependencies for Vulnerabilities
      if: github.event_name == 'pull_request'
      uses: actions/dependency-review-action@v5
      with:
        comment-summary-in-pr: always
        base-ref: ${{ inputs.base_ref }}
        head-ref: ${{ inputs.head_ref }}

    - name: Install Xplor.AI.Metrics.BuildTool
      env:
        NUGET_AUTH_USERNAME: ${{ secrets.XPLOR_PAY_PACKAGE_READ_PAT != '' && secrets.XPLOR_PAY_PACKAGE_READ_USERNAME || 'x-access-token' }}
        NUGET_AUTH_TOKEN: ${{ secrets.XPLOR_PAY_PACKAGE_READ_PAT != '' && secrets.XPLOR_PAY_PACKAGE_READ_PAT || steps.package-reader-token.outputs.token }}
        GITHUB_ORG: ${{ github.repository_owner }}
        TOOL_PACKAGE_VERSION: ${{ inputs.tool_package_version }}
        NUGET_PACKAGES: ${{ runner.temp }}/nuget-packages
      run: |
        set -euo pipefail

        TOOL_PATH="${{ runner.temp }}/tools"
        TEMP_CONFIG="${{ runner.temp }}/nuget.tool.config"

        # Use an isolated packages cache so tool install always evaluates the package as fetched
        # in this run, not a stale cache entry from other restore operations.
        rm -rf "$NUGET_PACKAGES"
        mkdir -p "$NUGET_PACKAGES"
        dotnet nuget locals all --clear >/dev/null 2>&1 || true

        # Use caller nuget.config (same behavior as local success path) and resolve placeholders
        # into concrete values for CI execution.
        if [ -f ./nuget.config ]; then
          cp ./nuget.config "$TEMP_CONFIG"
        else
          printf '%s\n' \
            '<?xml version="1.0" encoding="utf-8"?>' \
            '<configuration>' \
            '  <packageSources>' \
            '    <clear />' \
            '    <add key="github" value="https://nuget.pkg.github.com/%GITHUB_ORG%/index.json" />' \
            '    <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />' \
            '  </packageSources>' \
            '  <packageSourceCredentials>' \
            '    <github>' \
            '      <add key="Username" value="%GITHUB_USERNAME%" />' \
            '      <add key="ClearTextPassword" value="%GITHUB_TOKEN%" />' \
            '    </github>' \
            '  </packageSourceCredentials>' \
            '</configuration>' \
            > "$TEMP_CONFIG"
        fi

        python3 -c "from pathlib import Path; import os; p=Path('$TEMP_CONFIG'); s=p.read_text(encoding='utf-8'); s=s.replace('%GITHUB_ORG%', os.environ['GITHUB_ORG']).replace('%GITHUB_USERNAME%', os.environ['NUGET_AUTH_USERNAME']).replace('%GITHUB_TOKEN%', os.environ['NUGET_AUTH_TOKEN']); p.write_text(s, encoding='utf-8')"

        echo "Installing Xplor.AI.Metrics.BuildTool version: $TOOL_PACKAGE_VERSION"
        echo "NuGet packages cache: $NUGET_PACKAGES"

        PACKAGE_ID_LOWER="xplor.ai.metrics.buildtool"
        NUPKG_URL="https://nuget.pkg.github.com/$GITHUB_ORG/download/$PACKAGE_ID_LOWER/$TOOL_PACKAGE_VERSION/$PACKAGE_ID_LOWER.$TOOL_PACKAGE_VERSION.nupkg"
        NUPKG_PATH="${{ runner.temp }}/$PACKAGE_ID_LOWER.$TOOL_PACKAGE_VERSION.nupkg"
        NORMALIZED_NUPKG_PATH="${{ runner.temp }}/$PACKAGE_ID_LOWER.$TOOL_PACKAGE_VERSION.normalized.nupkg"
        LOCAL_SOURCE_DIR="${{ runner.temp }}/tool-package-source"

        rm -rf "$LOCAL_SOURCE_DIR"
        mkdir -p "$LOCAL_SOURCE_DIR"

        if curl -fLsS -u "$NUGET_AUTH_USERNAME:$NUGET_AUTH_TOKEN" -o "$NUPKG_PATH" "$NUPKG_URL"; then
          echo "Downloaded package for inspection: $NUPKG_PATH"

          if file "$NUPKG_PATH" | grep -qi "Zip archive"; then
            echo "Downloaded file is a valid ZIP container."
          else
            echo "::warning::Downloaded file is not a ZIP archive. First 200 bytes follow for diagnostics:"
            head -c 200 "$NUPKG_PATH" | tr -d '\000' || true
          fi

          echo "Listing package entries related to tool settings and nuspec:"
          unzip -l "$NUPKG_PATH" | grep -Ei "dotnettoolsettings|\.nuspec" || true

          # Some packages published from Windows can contain backslash-separated ZIP entry names
          # (e.g., tools\net8.0\any\DotnetToolSettings.xml). Linux dotnet tool install expects
          # forward slashes in ZIP paths, so normalize entries for ubuntu-latest compatibility.
          python3 -c "import zipfile; src='$NUPKG_PATH'; dst='$NORMALIZED_NUPKG_PATH'; zin=zipfile.ZipFile(src,'r'); zout=zipfile.ZipFile(dst,'w',compression=zipfile.ZIP_DEFLATED); [zout.writestr(info.filename.replace('\\\\','/'), zin.read(info.filename)) for info in zin.infolist()]; zin.close(); zout.close()"

          if [ -f "$NORMALIZED_NUPKG_PATH" ]; then
            echo "Listing normalized package entries related to tool settings and nuspec:"
            unzip -l "$NORMALIZED_NUPKG_PATH" | grep -Ei "dotnettoolsettings|\.nuspec" || true
          fi

          if unzip -l "$NORMALIZED_NUPKG_PATH" | grep -q "tools/net8.0/any/DotnetToolSettings.xml"; then
            echo "Found exact DotnetToolSettings.xml entry in package archive."
            cp "$NORMALIZED_NUPKG_PATH" "$LOCAL_SOURCE_DIR/$PACKAGE_ID_LOWER.$TOOL_PACKAGE_VERSION.nupkg"
            echo "Prepared local package source: $LOCAL_SOURCE_DIR"
          else
            echo "::warning::Exact DotnetToolSettings.xml entry not found in package archive."
            echo "::warning::If a differently cased file exists (for example, dotnettoolsettings.xml), Windows may succeed while ubuntu-latest fails due to case sensitivity."
          fi
        else
          echo "::warning::Could not download package archive for inspection from $NUPKG_URL"
        fi

        set +e
        if [ -f "$LOCAL_SOURCE_DIR/$PACKAGE_ID_LOWER.$TOOL_PACKAGE_VERSION.nupkg" ]; then
          INSTALL_OUTPUT=$(dotnet tool install Xplor.AI.Metrics.BuildTool --version "$TOOL_PACKAGE_VERSION" --tool-path "$TOOL_PATH" --add-source "$LOCAL_SOURCE_DIR" --ignore-failed-sources --verbosity detailed 2>&1)
        else
          INSTALL_OUTPUT=$(dotnet tool install Xplor.AI.Metrics.BuildTool --version "$TOOL_PACKAGE_VERSION" --tool-path "$TOOL_PATH" --configfile "$TEMP_CONFIG" --verbosity detailed 2>&1)
        fi
        INSTALL_EXIT_CODE=$?
        set -e

        printf '%s\n' "$INSTALL_OUTPUT"

        if [ "$INSTALL_EXIT_CODE" -ne 0 ]; then
          if printf '%s\n' "$INSTALL_OUTPUT" | grep -q "DotnetToolSettings.xml"; then
            echo "::error::Selected package version does not contain .NET tool metadata (DotnetToolSettings.xml)."
            echo "::error::Verify tool_package_version points to a valid tool build (for example, 1.0.2) and that version was packed with PackAsTool=true."
          fi

          exit "$INSTALL_EXIT_CODE"
        fi

        rm -f "$TEMP_CONFIG"
        echo "$TOOL_PATH" >> $GITHUB_PATH

    - name: Build Repository
      run: dotnet build --configuration Release --no-restore

    - name: Run Tests
      run: | 
        dotnet test --configuration Release \
        --no-build \
        --no-restore \
        --verbosity normal \
        "--filter:TestCategory!~Integration&Category!~Integration" \
        --collect:"XPlat Code Coverage;Format=opencover,cobertura" \
        --results-directory ./TestResults \
        -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.SkipAutoProps=true DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude=[*Tests*]* DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeAssembliesWithoutSources=MissingAll DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.SingleHit=false DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.IncludeTestAssembly=false DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.UseSourceLink=false DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.DeterministicReport=false DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByAttribute=Obsolete,GeneratedCodeAttribute,CompilerGeneratedAttribute,ExcludeFromCodeCoverageAttribute

    - name: Resolve Code Coverage Threshold
      id: coverage-threshold
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail

        DEFAULT_BRANCH=${{ github.event.repository.default_branch }}
        MINIMUM="${{ inputs.minimum_coverage_threshold }}"
        BASELINE=""

        if gh run download --name coverage-baseline \
                          --branch "$DEFAULT_BRANCH" \
                          --repo "${{ github.repository }}" 2>/dev/null && [ -f coverage.txt ]; then
          BASELINE=$(cat coverage.txt)
        else
          BASELINE="${{ inputs.baseline_coverage_threshold }}"
          echo "$BASELINE" > coverage.txt
        fi

        EFFECTIVE_THRESHOLD=$(awk "BEGIN { b=$BASELINE; m=$MINIMUM; if (b > m) printf \"%.2f\", b; else printf \"%.2f\", m }")
        # ReportGenerator expects an integer for lineCoverage.
        EFFECTIVE_THRESHOLD_INT=$(awk "BEGIN { t=$EFFECTIVE_THRESHOLD; if (t == int(t)) printf \"%d\", t; else printf \"%d\", int(t)+1 }")

        echo "baseline_value=$BASELINE" >> $GITHUB_OUTPUT
        echo "effective_threshold=$EFFECTIVE_THRESHOLD_INT" >> $GITHUB_OUTPUT

    - name: Generate Code Coverage Report
      uses: danielpalme/ReportGenerator-GitHub-Action@5.5.7
      with:
        reports: '**/TestResults/**/coverage.cobertura.xml'
        targetdir: 'coveragereport'
        reporttypes: 'HtmlInline;MarkdownSummary'
        customSettings: 'minimumCoverageThresholds:lineCoverage=${{ steps.coverage-threshold.outputs.effective_threshold }}'

    - name: Publish Code Coverage Summary to GitHub Action Summary
      run: cat coveragereport/Summary.md >> $GITHUB_STEP_SUMMARY

    - name: Upload HTML Code Coverage Report Artifact
      uses: actions/upload-artifact@v7
      with:
        name: code-coverage-report-${{ inputs.dotnet_version }}
        path: coveragereport
        retention-days: ${{ inputs.artifact_retention_days }}

    # Coverage regression is evaluated only for pull requests.
    - name: Compare Code Coverage Percentage to Threshold
      id: coverage-logic
      if: github.event_name == 'pull_request'
      run: |
        # 1. Extract new percentage from Cobertura XML for stable parsing.
        COVERAGE_FILE=$(find . -path "*/TestResults/*/coverage.cobertura.xml" | head -1)
        NEW_RATIO=$(grep -oPm1 '(?<=line-rate=")[0-9.]+' "$COVERAGE_FILE")
        NEW_PCT=$(awk "BEGIN { printf \"%.2f\", $NEW_RATIO * 100 }")
        echo "new_pct=$NEW_PCT" >> $GITHUB_OUTPUT

        # 2. Use resolved baseline value from the threshold step.
        BASELINE="${{ steps.coverage-threshold.outputs.baseline_value }}"
        echo "baseline_pct=$BASELINE" >> $GITHUB_OUTPUT

        # 3. Comparison
        if (( $(echo "$NEW_PCT < $BASELINE" | bc -l) )); then
          echo "status=fail" >> $GITHUB_OUTPUT
        else
          echo "status=pass" >> $GITHUB_OUTPUT
        fi

    - name: Prepare or Update Baseline Code Coverage File
      if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
      run: |
        # Build baseline from Cobertura XML on default-branch non-PR runs.
        COVERAGE_FILE=$(find . -path "*/TestResults/*/coverage.cobertura.xml" | head -1)
        BASELINE_RATIO=$(grep -oPm1 '(?<=line-rate=")[0-9.]+' "$COVERAGE_FILE")
        BASELINE_PCT=$(awk "BEGIN { printf \"%.2f\", $BASELINE_RATIO * 100 }")
        echo "$BASELINE_PCT" > coverage.txt

    # PR comment formatting and posting are skipped for non-PR runs.
    - name: Read Code Coverage Summary for Pull Request Comment
      id: read-summary
      if: github.event_name == 'pull_request'
      run: |
        # Use a unique delimiter for the multi-line output
        EOF=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
        echo "summary<<$EOF" >> $GITHUB_OUTPUT
        cat coveragereport/Summary.md >> $GITHUB_OUTPUT
        echo "$EOF" >> $GITHUB_OUTPUT

    - name: Add Comment to Pull Request with the Code Coverage Summary
      uses: mshick/add-pr-comment@v3
      if: github.event_name == 'pull_request'
      with:
        message-id: coverage-report
        message: |
          ### 📊 Code Coverage Summary
          ${{ steps.read-summary.outputs.summary }}
            
          **Regression Check**: ${{ steps.coverage-logic.outputs.status == 'pass' && '✅ Passed' || '❌ Failed' }}
          * New: `${{ steps.coverage-logic.outputs.new_pct }}%` | Baseline: `${{ steps.coverage-logic.outputs.baseline_pct }}%`
            
          ---
          🔍 [View Run Summary](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
        update-only: true

    - name: Enforce .editorconfig Code Styles
      run: dotnet format --verbosity detailed --verify-no-changes

    # Fail PR runs when regression check reports lower coverage than baseline.
    - name: Fail Pull Request Verifications if Code Coverage Does Not Meet Threshold
      if: github.event_name == 'pull_request' && steps.coverage-logic.outputs.status == 'fail'
      run: exit 1

    # This step ensures that if we are on the default branch, we update the baseline for future PRs
    - name: Update Baseline Code Coverage Artifact
      if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
      uses: actions/upload-artifact@v7
      with:
        name: coverage-baseline
        path: coverage.txt
        retention-days: ${{ inputs.artifact_retention_days }}

    - name: Pack NuGet Package(s)
      if: ${{ inputs.nuget_package == true && inputs.upload_artifact == true }}
      run: |
          # Count .sln files in the root directory
          SLN_COUNT=$(find . -maxdepth 1 -name "*.sln" | wc -l)

          if [ "$SLN_COUNT" -gt 0 ]; then
            echo "✅ Found Solution file(s) in root. Packing solution..."
            dotnet pack --configuration Release --no-build --output ./dist
          else
            echo "⚠️ No .sln found in root. Packing eligible .csproj files recursively..."
            find . \( -path "./test" -o -path "./test/*" -o -path "./sample" -o -path "./sample/*" \) -prune -o -name "*.csproj" ! -name "*Tests*.csproj" ! -name "*Sample*.csproj" -exec dotnet pack --configuration Release --no-build --output ./dist {} +
          fi

    - name: Upload NuGet Package(s) to Actions Artifact Storage for Publish to GitHub Packages
      if: ${{ inputs.nuget_package == true && inputs.upload_artifact == true }}
      uses: actions/upload-artifact@v7
      with:
        name: nuget-dist
        path: ./dist
        retention-days: ${{ inputs.artifact_retention_days }}

  publish:
    name: Publish NuGet Package(s) to GitHub Packages
    if: ${{ inputs.nuget_package == true && inputs.upload_artifact == true }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6

    - name: Setup .NET Environment
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet_version }}

    - name: Generate Xplor Pay Package Writer App Token
      id: package-writer-token
      uses: actions/create-github-app-token@v3
      with:
        client-id: ${{ secrets.XPLOR_PAY_PACKAGE_WRITER_APP_CLIENT_ID }}
        private-key: ${{ secrets.XPLOR_PAY_PACKAGE_WRITER_APP_PRIVATE_KEY }}
        owner: ${{ github.repository_owner }}

    - name: Download NuGet Package(s) from Actions Artifact Storage for Publish to GitHub Packages
      uses: actions/download-artifact@v7
      with:
        name: nuget-dist
        path: ./dist

    - name: Publish NuGet Package(s)to GitHub Packages
      env:
          GITHUB_USERNAME: x-access-token
          GITHUB_TOKEN: ${{ steps.package-writer-token.outputs.token }}
          GITHUB_ORG: ${{ github.repository_owner }}
      run: |
          set -euo pipefail

          CONFIG_FILE="./nuget.config"
          TEMP_CONFIG="$RUNNER_TEMP/nuget.publish.config"

          cleanup() {
            rm -f "$TEMP_CONFIG"
          }
          trap cleanup EXIT

          if [ -f "$CONFIG_FILE" ]; then
            cp "$CONFIG_FILE" "$TEMP_CONFIG"
          else
            printf '%s\n' \
              '<?xml version="1.0" encoding="utf-8"?>' \
              '<configuration>' \
              '  <packageSources>' \
              '    <clear />' \
              '    <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />' \
              '  </packageSources>' \
              '</configuration>' > "$TEMP_CONFIG"
          fi

          if dotnet nuget list source --configfile "$TEMP_CONFIG" | grep -qi "github"; then
            dotnet nuget update source github \
              --source "https://nuget.pkg.github.com/$GITHUB_ORG/index.json" \
              --username "$GITHUB_USERNAME" \
              --password "$GITHUB_TOKEN" \
              --store-password-in-clear-text \
              --configfile "$TEMP_CONFIG"
          else
            dotnet nuget add source "https://nuget.pkg.github.com/$GITHUB_ORG/index.json" \
              --name github \
              --username "$GITHUB_USERNAME" \
              --password "$GITHUB_TOKEN" \
              --store-password-in-clear-text \
              --configfile "$TEMP_CONFIG"
          fi

          echo "Publishing NuGet packages to GitHub Packages..."
          for nupkg in ./dist/*.nupkg; do
            dotnet nuget push "$nupkg" --source "github" --skip-duplicate --configfile "$TEMP_CONFIG"
          done
