name: Clearent platform validation

on:
  pull_request:
    paths:
      - .github/actions/clearent-kubernetes-deploy/**
      - .github/actions/container/**
      - .github/actions/coverage-report/**
      - .github/actions/dotnet/**
      - .github/actions/java/**
      - .github/actions/node/**
      - .github/actions/python/**
      - .github/actionlint.yaml
      - .github/workflows/clearent-*.yml
      - coralogix/**
      - docs/**
      - kubernetes/helm/clearent-app/**
      - policies/**
      - schemas/**
      - scripts/**
      - README.md
      - kubernetes/README.md
  push:
    branches:
      - main
    paths:
      - .github/actions/clearent-kubernetes-deploy/**
      - .github/actions/container/**
      - .github/actions/coverage-report/**
      - .github/actions/dotnet/**
      - .github/actions/java/**
      - .github/actions/node/**
      - .github/actions/python/**
      - .github/actionlint.yaml
      - .github/workflows/clearent-*.yml
      - coralogix/**
      - docs/**
      - kubernetes/helm/clearent-app/**
      - policies/**
      - schemas/**
      - scripts/**
      - README.md
      - kubernetes/README.md
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: clearent-platform-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Clearent platform assets
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          persist-credentials: false

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.19.0

      - name: Install pinned YAML test dependency
        shell: pwsh
        env:
          CLEARENT_AGAVE_ENABLED: "true"
          CLEARENT_USE_APPLICATION_MANIFESTS: "true"
        run: >-
          ./scripts/Install-AgaveDependencies.ps1

      - name: Parse GitHub workflow and action YAML
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t yaml_files < <(
            find \
              .github/actions/clearent-kubernetes-deploy \
              .github/actions/container \
              .github/actions/coverage-report \
              .github/actions/dotnet \
              .github/actions/java \
              .github/actions/node \
              .github/actions/python \
              -type f -name 'action.yml' -print
            find .github/workflows -maxdepth 1 -type f \
              -name 'clearent-*.yml' -print
          )
          ruby -e '
            require "psych"
            ARGV.each { |path| Psych.parse_file(path) }
          ' "${yaml_files[@]}"

      - name: Lint Clearent GitHub workflows
        shell: bash
        run: |
          set -euo pipefail
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7 \
            -no-color \
            .github/workflows/clearent-*.yml

      - name: Parse PowerShell sources
        shell: pwsh
        run: |
          $parseErrors = [System.Collections.Generic.List[string]]::new()
          Get-ChildItem -Path `
            scripts, `
            .github/actions/clearent-kubernetes-deploy, `
            .github/actions/coverage-report, `
            .github/actions/java, `
            .github/actions/node, `
            .github/actions/python `
            -Filter *.ps1 -File -Recurse |
            ForEach-Object {
              $errors = $null
              [void][Management.Automation.Language.Parser]::ParseFile(
                $_.FullName,
                [ref]$null,
                [ref]$errors
              )
              foreach ($error in @($errors)) {
                $parseErrors.Add("$($_.FullName): $($error.Message)")
              }
            }
          if ($parseErrors.Count -gt 0) {
            throw ($parseErrors -join [Environment]::NewLine)
          }

      - name: Run repository PowerShell tests
        shell: pwsh
        run: >-
          ./scripts/Invoke-RepositoryTests.ps1
          -ResultsPath ./test-results/powershell-tests.xml

      - name: Validate Helm 3 deployment compatibility
        shell: bash
        run: |
          set -euo pipefail

          helm version
          helm lint --strict kubernetes/helm/clearent-app \
            --set-string global.environment=audit \
            --set-string applicationFramework=dotnet \
            --set-string applicationType=service \
            --set-string image.repository=audit/app \
            --set-string image.tag=test \
            --set-string pipeline.provider=github_actions \
            --set-string pipeline.name=clearent-platform-validation \
            --set-string pipeline.runUri=https://github.com/xplor-pay/audit/actions/runs/123 \
            --set-string pipeline.repository=xplor-pay/audit \
            --set-string pipeline.repositoryOwner=xplor-pay \
            --set-string pipeline.environment=audit

          helm template audit kubernetes/helm/clearent-app \
            --namespace audit \
            --set-string global.environment=audit \
            --set-string applicationFramework=dotnet \
            --set-string applicationType=service \
            --set-string image.repository=audit/app \
            --set-string image.tag=test \
            --set-string pipeline.provider=github_actions \
            --set-string pipeline.name=clearent-platform-validation \
            --set-string pipeline.runUri=https://github.com/xplor-pay/audit/actions/runs/123 \
            --set-string pipeline.repository=xplor-pay/audit \
            --set-string pipeline.repositoryOwner=xplor-pay \
            --set-string pipeline.environment=audit \
            --set agave.enabled=true \
            --set-string secretsContract.default.API_KEY=api-key \
            >/dev/null

      # Helm 3 install --dry-run still initialises Kubernetes discovery while
      # rendering NOTES.txt. Helm 4 provides a genuinely client-only path for
      # the complete matrix without granting this job cluster access.
      - name: Install offline-test Helm client
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v4.2.3

      - name: Run Helm render matrix
        shell: bash
        run: |
          set -euo pipefail

          helm version
          bash kubernetes/helm/clearent-app/tests/render-matrix.sh

      - name: Lint shell tests
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t shell_files < <(
            find \
              .github/actions/container \
              .github/actions/java \
              .github/actions/node \
              .github/actions/python \
              kubernetes/helm/clearent-app/tests \
              -type f -name '*.sh' -print
          )
          shellcheck "${shell_files[@]}"

      - name: Upload test evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: clearent-platform-test-results
          path: test-results/
          if-no-files-found: warn
          retention-days: 14
