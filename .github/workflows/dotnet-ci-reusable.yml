name: .NET CI Reusable

on:
  workflow_call:
    inputs:
      baseline_coverage_threshold:
        description: Baseline coverage percentage threshold for pull requests when no baseline is defined.
        required: false
        type: string
        default: "0"

      minimum_coverage_threshold:
        description: Minimum overall line coverage threshold enforced by ReportGenerator.
        required: false
        type: string
        default: "80"

      base_ref:
        description: Base branch for comparison in pull requests.
        type: string
        required: false

      head_ref:
        description: Head branch containing changes for pull requests.
        type: string
        required: false

      artifact_retention_days:
        description: Number of days to retain workflow artifacts.
        required: false
        type: string
        default: "7"

      enforce_code_style:
        description: Toggle to indicate whether code style enforcement should be applied.
        required: false
        type: boolean
        default: false

      ai_metrics_package_repository:
        description: Repository that owns the Xplor.AI.Metrics.BuildTool package.
        required: false
        type: string
        default: Xplor.AI.Metrics.BuildTool

      ai_metrics_package_version:
        description: Version of Xplor.AI.Metrics.BuildTool to install.
        required: false
        type: string
        default: "1.0.2"

      pack_dotnet_version:
        description: Optional override for the .NET SDK used by downstream pack and publish jobs.
        required: false
        type: string
        default: ""

    outputs:
      matrix:
        description: JSON array of discovered SDK versions for CI matrix execution.
        value: ${{ jobs.setup.outputs.matrix }}

      pack_dotnet_version:
        description: Resolved SDK version for downstream pack and publish workflows.
        value: ${{ jobs.setup.outputs.pack_dotnet_version }}

jobs:
  setup:
    name: Scan Repo for .NET Versions
    runs-on: ubuntu-latest
    timeout-minutes: 2

    permissions:
      contents: read

    outputs:
      matrix: ${{ steps.get-versions.outputs.matrix }}
      pack_dotnet_version: ${{ steps.get-versions.outputs.pack_dotnet_version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Get .NET Version(s) from TargetFramework(s)
        id: get-versions
        shell: bash
        run: |
          # Pack SDK resolution precedence:
          # 1) workflow input pack_dotnet_version (if provided)
          # 2) global.json sdk.version (if present)
          # 3) highest discovered target framework SDK version
          # 4) fallback to 8.0.x

          VERSIONS=$(grep -rE "<TargetFrameworks?>(.*)</TargetFrameworks?>" --include="*.csproj" --include="*.props" . | \
          sed -E 's/.*<TargetFrameworks?>//;s/<\/TargetFrameworks?>.*//' | \
          tr ';' '\n' | sed 's/ //g' | \
          grep -v "standard" | \
          sed -E 's/^(netcoreapp|net)([0-9]+(\.[0-9]+)?).*/\2.x/' | \
          sort -u | xargs)

          if [ -n "$VERSIONS" ]; then
            JSON_ARRAY=$(echo "$VERSIONS" | jq -R -c 'split(" ")')
            HIGHEST_DISCOVERED_PACK_VERSION=$(printf '%s\n' "$VERSIONS" | tr ' ' '\n' | sort -V | tail -1)
          else
            JSON_ARRAY='["8.0.x"]'
            HIGHEST_DISCOVERED_PACK_VERSION="8.0.x"
          fi

          PACK_VERSION_OVERRIDE='${{ inputs.pack_dotnet_version }}'
          if [ -n "$PACK_VERSION_OVERRIDE" ]; then
            PACK_VERSION="$PACK_VERSION_OVERRIDE"
            PACK_VERSION_SOURCE="workflow input pack_dotnet_version"
          elif [ -f ./global.json ]; then
            GLOBAL_JSON_SDK_VERSION=$(jq -r '.sdk.version // empty' ./global.json)
            if [ -n "$GLOBAL_JSON_SDK_VERSION" ]; then
              PACK_VERSION="$GLOBAL_JSON_SDK_VERSION"
              PACK_VERSION_SOURCE="global.json sdk.version"
            else
              PACK_VERSION="$HIGHEST_DISCOVERED_PACK_VERSION"
              PACK_VERSION_SOURCE="highest discovered target framework (global.json missing sdk.version)"
            fi
          else
            PACK_VERSION="$HIGHEST_DISCOVERED_PACK_VERSION"
            PACK_VERSION_SOURCE="highest discovered target framework"
          fi

          if [ -z "$PACK_VERSION" ]; then
            PACK_VERSION="8.0.x"
          fi

          echo "Resolved pack dotnet version: $PACK_VERSION ($PACK_VERSION_SOURCE)"
          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT
          echo "pack_dotnet_version=$PACK_VERSION" >> $GITHUB_OUTPUT

  build:
    name: Continuous Integration
    runs-on: ubuntu-latest
    needs: setup

    strategy:
      matrix:
        dotnet_version: ${{ fromJson(needs.setup.outputs.matrix) }}

    timeout-minutes: 15

    permissions:
      contents: read
      actions: read
      pull-requests: write
      packages: read

    env:
      NUGET_PLUGIN_HANDSHAKE_TIMEOUT_IN_SECONDS: ${{ vars.NUGET_PLUGIN_HANDSHAKE_TIMEOUT_IN_SECONDS || '20' }}
      NUGET_PLUGIN_REQUEST_TIMEOUT_IN_SECONDS: ${{ vars.NUGET_PLUGIN_REQUEST_TIMEOUT_IN_SECONDS || '20' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Environment
        uses: xplor-pay/github-actions/.github/actions/dotnet/environment_setup@main
        with:
          dotnet_version: ${{ matrix.dotnet_version }}

      - name: Verify nuget.config Exists at Repository Root
        continue-on-error: true
        run: |
          set -euo pipefail

          if [ ! -f ./nuget.config ]; then
            echo "::error::nuget.config was not found at repository root."
            exit 1
          fi

          echo "nuget.config exists at repository root."

      - name: List NuGet Sources from nuget.config
        continue-on-error: true
        run: |
          set -euo pipefail

          echo "Configured NuGet sources from ./nuget.config:"
          dotnet nuget list source --configfile ./nuget.config

      - name: Verify Authentication to GitHub Packages
        continue-on-error: true
        env:
          GITHUB_USERNAME: ${{ secrets.PACKAGE_READER_PAT_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.PACKAGE_READER_PAT_TOKEN }}
        run: |
          set -euo pipefail

          FEED_URL="https://nuget.pkg.github.com/xplor-pay/index.json"
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -u "$GITHUB_USERNAME:$GITHUB_TOKEN" "$FEED_URL")

          if [ "$STATUS" != "200" ]; then
            echo "::error::GitHub Packages auth preflight failed (HTTP $STATUS) for $FEED_URL. Verify caller permissions and package access settings."
            exit 1
          fi

          echo "GitHub Packages auth preflight succeeded (HTTP $STATUS)."

      - name: Restore Repository Dependencies
        uses: xplor-pay/github-actions/.github/actions/dotnet/run_dotnet@main
        env:
          GITHUB_USERNAME: ${{ secrets.PACKAGE_READER_PAT_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.PACKAGE_READER_PAT_TOKEN }}
          GITHUB_ORG: ${{ github.repository_owner }}
        with:
          command: restore
          arguments: |
            --configfile
            ./nuget.config

      - name: Review Repository Dependencies for Vulnerabilities
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v5
        with:
          comment-summary-in-pr: always
          base-ref: ${{ inputs.base_ref }}
          head-ref: ${{ inputs.head_ref }}

      - name: Enforce .editorconfig Code Styles
        if: inputs.enforce_code_style == true
        uses: xplor-pay/github-actions/.github/actions/dotnet/run_dotnet@main
        with:
          command: format
          arguments: |
            --verbosity
            detailed
            --verify-no-changes

      - name: Build Repository
        uses: xplor-pay/github-actions/.github/actions/dotnet/run_dotnet@main
        with:
          command: build
          arguments: |
            --configuration
            Release
            --no-restore
            -p:CopyLocalLockFileAssemblies=true

      - name: Run Tests
        uses: xplor-pay/github-actions/.github/actions/dotnet/run_dotnet@main
        with:
          command: test
          arguments: |
            --configuration
            Release
            --no-build
            --no-restore
            --verbosity
            normal
            --filter:TestCategory!~Integration&Category!~Integration
            --collect:XPlat Code Coverage;Format=opencover,cobertura
            --results-directory
            ./TestResults
            --
            DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.SkipAutoProps=true
            DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude=[*Tests*]*
            DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeAssembliesWithoutSources=MissingAll
            DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.SingleHit=false
            DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.IncludeTestAssembly=false
            DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.UseSourceLink=false
            DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.DeterministicReport=false
            DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByAttribute=Obsolete,GeneratedCodeAttribute,CompilerGeneratedAttribute,ExcludeFromCodeCoverageAttribute

      - name: Code Coverage Analysis and Reporting
        id: coverage-threshold
        uses: xplor-pay/github-actions/.github/actions/dotnet/coverage@main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          dotnet_version: ${{ matrix.dotnet_version }}
          baseline_coverage_threshold: ${{ inputs.baseline_coverage_threshold }}
          minimum_coverage_threshold: ${{ inputs.minimum_coverage_threshold }}
          artifact_retention_days: ${{ inputs.artifact_retention_days }}

      - name: AI Metrics Analysis and Reporting
        id: ai-metrics-analysis
        uses: xplor-pay/github-actions/.github/actions/dotnet/ai_metrics@main
        env:
          GITHUB_USERNAME: ${{ secrets.PACKAGE_READER_PAT_TOKEN != '' && secrets.PACKAGE_READER_PAT_USERNAME || 'x-access-token' }}
          GITHUB_TOKEN: ${{ secrets.PACKAGE_READER_PAT_TOKEN }}
          GITHUB_ORG: ${{ github.repository_owner }}
          AI_METRICS_PACKAGE_VERSION: ${{ inputs.ai_metrics_package_version }}
        with:
          sftp_server: ${{ secrets.AI_METRICS_SFTP_SERVER }}
          ai_path: ${{ vars.AI_METRICS_AI_PATH}}
          coverage_path: ${{ vars.AI_METRICS_COVERAGE_PATH }}
          container_name: ${{ vars.AI_METRICS_CONTAINER_NAME }}
          sas_key: ${{ secrets.AI_METRICS_SAS_KEY }}
        continue-on-error: true
